<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Frogfish BD Agent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono','Courier New',monospace;background:#0a0f0d;color:#e2ffe8;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0f0d}::-webkit-scrollbar-thumb{background:#1a5c2e;border-radius:2px}
.header{border-bottom:1px solid #1a3320;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;background:#060c08;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:16px}
.logo-icon{width:32px;height:32px;background:#1a5c2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#4ade80;letter-spacing:.05em}
.logo-sub{font-size:9px;color:#2d5c3a;letter-spacing:.2em;text-transform:uppercase}
.tabs{border-bottom:1px solid #1a3320;padding:0 28px;background:#060c08;display:flex;position:sticky;top:65px;z-index:9}
.tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 18px;color:#4a7a58;transition:all .2s}
.tab.active{color:#4ade80;border-bottom-color:#4ade80}
.tab:hover{color:#a3e4b0}
.tab-badge{background:#f87171;color:#0a0f0d;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:5px}
.content{padding:24px 28px;max-width:1200px}
.card{background:#0e1a12;border:1px solid #1a3320;border-radius:3px;padding:20px;margin-bottom:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-12{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}
.label{font-size:9px;color:#2d5c3a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.stat-num{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:#4ade80;line-height:1}
.btn{background:#1a5c2e;border:1px solid #4ade80;color:#4ade80;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover{background:#4ade80;color:#0a0f0d}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-sm{padding:7px 14px;font-size:10px}
.btn-approve{background:#1a5c2e;border:1px solid #4ade80;color:#4ade80;font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;cursor:pointer;border-radius:2px;transition:all .2s;text-transform:uppercase}
.btn-approve:hover{background:#4ade80;color:#0a0f0d}
.btn-reject{background:none;border:1px solid #f87171;color:#f87171;font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;cursor:pointer;border-radius:2px;text-transform:uppercase}
.btn-reject:hover{background:#f87171;color:#0a0f0d}
.btn-ghost{background:none;border:1px solid #4a7a58;color:#4a7a58;font-family:'DM Mono',monospace;font-size:11px;padding:10px 20px;cursor:pointer;border-radius:2px}
.btn-ghost:hover{background:#4a7a58;color:#0a0f0d}
.log-entry{border-left:2px solid;padding:6px 12px;margin-bottom:5px;font-size:11px;border-radius:0 2px 2px 0}
.log-scroll{max-height:320px;overflow-y:auto}
.score-bar{height:4px;background:#1a3320;border-radius:2px;overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:2px}
.lead-row{border-bottom:1px solid #1a3320;padding:13px 0;cursor:pointer;transition:background .15s}
.lead-row:hover{background:#0d2a14}
.email-box{background:#060c08;border:1px solid #1a3320;border-radius:2px;padding:16px;font-size:12px;line-height:1.8;color:#b0d4b8;white-space:pre-wrap;min-height:160px;max-height:320px;overflow-y:auto}
.email-edit{background:#060c08;border:1px solid #4ade80;border-radius:2px;padding:16px;font-size:12px;line-height:1.8;color:#b0d4b8;min-height:200px;max-height:400px;overflow-y:auto;width:100%;resize:vertical;font-family:'DM Mono',monospace;outline:none}
.progress-bar{height:2px;background:#1a3320;border-radius:1px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#1a5c2e,#4ade80);transition:width .4s}
input{background:#060c08;border:1px solid #1a3320;color:#e2ffe8;font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;border-radius:2px;width:100%;outline:none}
input:focus{border-color:#4ade80}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.error-banner{background:#1a0a0a;border:1px solid #f87171;border-radius:3px;padding:14px 16px;margin-bottom:16px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.flex{display:flex}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-8{gap:8px}.gap-12{gap:12px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.col-header{font-size:9px;color:#2d5c3a;letter-spacing:.15em;text-transform:uppercase;padding:6px 0 10px;border-bottom:1px solid #1a3320;display:grid;gap:8px}
.review-card{background:#0e1a12;border:1px solid #1a3320;border-radius:3px;padding:20px;margin-bottom:12px}
.review-card.approved{border-color:#4ade80;background:#0a1f0d}
.review-card.rejected{border-color:#f87171;background:#1a0a0a;opacity:.6}
.status-pill{display:inline-block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;font-family:'DM Mono',monospace}
.pill-pending{background:#1a3320;color:#4a7a58;border:1px solid #2d5c3a}
.pill-approved{background:#0a2a10;color:#4ade80;border:1px solid #4ade80}
.pill-rejected{background:#2a0a0a;color:#f87171;border:1px solid #f87171}
.pill-failed{background:#2a0a0a;color:#fbbf24;border:1px solid #fbbf24}
</style>
</head>
<body>
<div id="app"></div>
<script>
var CALENDLY = 'https://calendly.com/frogfishconsulting/discovery';

var NICHES = [
  {id:'legal', label:'Law Firms', industries:['legal services'], titles:['Managing Partner','Partner','Marketing Director','CMO','Business Development Manager'], pain:'optimizing campaigns for form fills instead of signed cases'},
  {id:'home', label:'Home Services', industries:['consumer services','construction'], titles:['Owner','CEO','Marketing Manager','Director of Marketing','VP of Marketing'], pain:'running ads but no visibility into which campaigns drive actual closed jobs'},
  {id:'financial', label:'Financial/Insurance', industries:['financial services','insurance'], titles:['CMO','VP of Marketing','Director of Digital Marketing','Head of Growth','Marketing Manager'], pain:'high cost per lead with no visibility into which leads actually convert to clients'}
];

var MOCK = [
  {id:1, company:'Harmon and Associates Law', contact:'Derek Harmon', firstName:'Derek', title:'Managing Partner', email:'d.harmon@harmonlaw.com', employees:'28', spend_signal:'Google Ads + LSA', score:92, niche:'legal', location:'Los Angeles, CA'},
  {id:2, company:'Greenleaf HVAC', contact:'Sandra Torres', firstName:'Sandra', title:'Owner / CEO', email:'sandra@greenleafhvac.com', employees:'32', spend_signal:'LSA + Meta', score:88, niche:'home', location:'Dallas, TX'},
  {id:3, company:'BrightPath Insurance', contact:'Tom Achebe', firstName:'Tom', title:'Head of Digital', email:'t.achebe@brightpath.com', employees:'67', spend_signal:'Meta + Google', score:89, niche:'financial', location:'Austin, TX'},
  {id:4, company:'Summit Financial Group', contact:'Rachel Kim', firstName:'Rachel', title:'CMO', email:'rkim@summitfg.com', employees:'210', spend_signal:'Display + Search', score:85, niche:'financial', location:'Chicago, IL'},
  {id:5, company:'Metro Roofing Co', contact:'Lisa Carmichael', firstName:'Lisa', title:'Marketing Manager', email:'lisa@metroroofing.com', employees:'44', spend_signal:'LSA + Facebook', score:82, niche:'home', location:'Denver, CO'},
  {id:6, company:'Apex Solar Solutions', contact:'Marcus Webb', firstName:'Marcus', title:'VP of Marketing', email:'m.webb@apexsolar.com', employees:'85', spend_signal:'Google Ads + Meta', score:94, niche:'home', location:'Phoenix, AZ'}
];

var S = {
  tab: 'dashboard',
  leads: [],           // current lead queue (shown in Leads tab)
  selLead: null,
  reviewQueue: [],     // emails pending/approved/rejected
  editingId: null,
  sent: 0, booked: 0,
  seenEmails: [],      // ALL emails ever pulled - permanent dedup list
  sentLog: [],         // full log of every sent email with who/when/variant
  variantStats: {A:{sent:0,opened:0,replied:0},B:{sent:0,opened:0,replied:0},C:{sent:0,opened:0,replied:0},D:{sent:0,opened:0,replied:0}},
  scanning: false, scanProg: 0,
  lastError: null,
  dailyLimit: 5, maxPerCompany: 1,
  autoScan: false, autoScanInterval: null, apolloPage: 1,
  log: [
    {t:'09:14 AM', m:'Agent ready - run a scan to get started', c:'info'}
  ],
  keys: (function(){ try{ return JSON.parse(localStorage.getItem('ff_k')||'{}'); }catch(e){ return {}; } }()),
  showK: {}, keySaved: false
};

// Restore persisted state
(function(){
  try {
    var sl = localStorage.getItem('ff_leads'); if(sl) S.leads = JSON.parse(sl);
    var sq = localStorage.getItem('ff_queue'); if(sq) S.reviewQueue = JSON.parse(sq);
    var ss = localStorage.getItem('ff_sent'); if(ss) S.sent = JSON.parse(ss);
    var sv = localStorage.getItem('ff_vstats'); if(sv) S.variantStats = JSON.parse(sv);
    var se = localStorage.getItem('ff_seen'); if(se) S.seenEmails = JSON.parse(se);
    var sl2 = localStorage.getItem('ff_sentlog'); if(sl2) S.sentLog = JSON.parse(sl2);
    var sp = localStorage.getItem('ff_page'); if(sp) S.apolloPage = JSON.parse(sp);
  } catch(e) { console.log('Restore error:', e); }
})();

var sendTimer = null;
var LC = {info:'#7dd3fc', success:'#86efac', meeting:'#fbbf24', reply:'#c4b5fd', error:'#f87171'};

function set(p){ 
  Object.assign(S, typeof p==='function' ? p(S) : p); 
  // Persist leads and reviewQueue to localStorage
  try {
    localStorage.setItem('ff_leads', JSON.stringify(S.leads));
    localStorage.setItem('ff_queue', JSON.stringify(S.reviewQueue));
    localStorage.setItem('ff_sent', JSON.stringify(S.sent));
    localStorage.setItem('ff_vstats', JSON.stringify(S.variantStats));
  } catch(e) {}
  draw(); 
}
function log(m,c){ if(!c)c='info'; var t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); S.log=[{t:t,m:m,c:c}].concat(S.log).slice(0,60); }

function buildEmail(greeting, bodyText, company) {
  return greeting + '\n\n' + bodyText + '\n\nWorth a 20-min call?\n' + CALENDLY + '\n\nJared\nFrogfish Consulting';
}

function cleanBody(raw) {
  return raw
    .replace(/^(hi\s[^\n]*\n+)/i, '')
    .replace(/\n+(best,?|regards,?|sincerely,?|cheers,?|thanks,?|warm regards,?)\s*\n[\s\S]*$/i, '')
    .replace(/\[your\s*name\]/gi, '')
    .replace(/\[name\]/gi, '')
    .replace(/^\n+/, '')
    .replace(/\n+$/, '')
    .trim();
}

async function callAI(prompt) {
  var h = {'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(S.keys.anthropic) h['x-api-key'] = S.keys.anthropic;
  var r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: h,
    body: JSON.stringify({model:'claude-haiku-4-5-20251001', max_tokens:600, messages:[{role:'user',content:prompt}]})
  });
  var d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return (d.content && d.content[0] && d.content[0].text) || '';
}

async function apiPost(path, body) {
  var r = await fetch(path, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  var t = await r.text();
  try{ return JSON.parse(t); }catch(e){ return {parseError:t.slice(0,300)}; }
}

function scoreP(p) {
  var s = 50;
  var t = (p.title||'').toLowerCase();
  var org = p.organization || {};
  var employees = org.estimated_num_employees || 0;
  var industry = (org.industry||'').toLowerCase();
  var keywords = (org.keywords||[]).join(' ').toLowerCase();
  var technologies = (p.technologies||org.current_technologies||[]).map(function(x){ return (x.name||x||'').toLowerCase(); }).join(' ');

  // Title seniority - decision maker weight
  if(['ceo','founder','owner','managing partner','president'].some(function(x){ return t.indexOf(x)>=0; })) s+=20;
  else if(['cmo','vp','vice president','chief marketing'].some(function(x){ return t.indexOf(x)>=0; })) s+=17;
  else if(['director','head of','partner'].some(function(x){ return t.indexOf(x)>=0; })) s+=13;
  else if(['manager','lead','specialist'].some(function(x){ return t.indexOf(x)>=0; })) s+=6;

  // Verified email
  if(p.email && p.email.indexOf('unknown')===-1) s+=10;

  // Company size - sweet spot is 20-500 employees
  if(employees>=200) s+=12;
  else if(employees>=50) s+=10;
  else if(employees>=20) s+=7;
  else if(employees>=5) s+=3;

  // Google Ads / paid media signals from technologies and keywords
  if(technologies.indexOf('google ads')>=0 || technologies.indexOf('google adwords')>=0) s+=15;
  else if(technologies.indexOf('google tag manager')>=0 || technologies.indexOf('google analytics')>=0) s+=8;
  if(technologies.indexOf('facebook ads')>=0 || technologies.indexOf('meta ads')>=0) s+=8;
  if(technologies.indexOf('hubspot')>=0 || technologies.indexOf('salesforce')>=0 || technologies.indexOf('crm')>=0) s+=10;

  // Keywords suggesting active digital marketing
  if(keywords.indexOf('lead generation')>=0 || keywords.indexOf('digital marketing')>=0) s+=8;
  if(keywords.indexOf('paid search')>=0 || keywords.indexOf('ppc')>=0 || keywords.indexOf('sem')>=0) s+=10;
  if(keywords.indexOf('google ads')>=0 || keywords.indexOf('adwords')>=0) s+=8;

  // Industry fit - high value industries
  if(industry.indexOf('legal')>=0 || industry.indexOf('law')>=0) s+=8;
  if(industry.indexOf('insurance')>=0 || industry.indexOf('financial')>=0) s+=7;
  if(industry.indexOf('hvac')>=0 || industry.indexOf('roofing')>=0 || industry.indexOf('plumbing')>=0 || industry.indexOf('home services')>=0) s+=7;
  if(industry.indexOf('solar')>=0 || industry.indexOf('real estate')>=0) s+=6;

  // Revenue signals - if Apollo has annual revenue data
  var revenue = org.annual_revenue_printed || org.annual_revenue || 0;
  if(typeof revenue === 'string') {
    if(revenue.indexOf('M')>=0) s+=10;
    else if(revenue.indexOf('K')>=0) s+=5;
  } else if(revenue > 1000000) s+=10;
  else if(revenue > 500000) s+=6;

  return Math.min(s, 99);
}

function applyDailyLimits(leads) {
  var counts = {};
  var result = [];
  var companies = [];
  for(var i=0;i<leads.length;i++) {
    var l = leads[i];
    var co = l.company.toLowerCase();
    if(!counts[co]) { counts[co]=0; companies.push(co); }
    if(companies.filter(function(c){ return counts[c]>0||c===co; }).length > S.dailyLimit && counts[co]===0) continue;
    if(counts[co] < S.maxPerCompany) { counts[co]++; result.push(l); }
  }
  return result;
}

function makePrompt(company, title, location, pain, niche, websiteContext, variant, staffName) {
  var cs = niche==='legal'
    ? 'A firm in a similar position restructured campaigns around CRM closed case data. Cost per signed case dropped 42% in 4 months.'
    : niche==='home'
    ? 'A similar company found one campaign eating 30% of budget with zero closed jobs. Cut it - revenue per marketing dollar nearly doubled.'
    : 'A comparable business connected their CRM to their campaigns and grew revenue 28% without touching their ad spend.';

  var googleCred = 'Before Frogfish, our team spent 10 years at Google running lead gen in this exact space. We know how the algorithm thinks - and it is not optimizing for your bottom line.';
  var context = websiteContext && websiteContext.length > 50 ? 'COMPANY RESEARCH (use to make opening hyper-specific, DO NOT summarize - use it to identify the exact version of the problem they face): ' + websiteContext.slice(0, 600) + ' ' : '';
  var offer = 'First month free. No contract. We connect your data, show you exactly where spend is leaking, and prove bottom line impact. If we cannot, you owe nothing.';
  var rules = 'COLD EMAIL RULES: Under 120 words. 3 short paragraphs. Casual peer-to-peer tone. No exclamation marks. No corporate speak. No "I hope this finds you well". No "I wanted to reach out". Pattern interrupt opening. ONE clear ask at the end. OUTPUT BODY PARAGRAPHS ONLY - no greeting, no signature, no subject line, no Calendly link.';

  if(variant === 'B') {
    return context + 'Write a cold email body for Jared at Frogfish Consulting to ' + title + ' at ' + company + ' (' + location + '). VARIANT B - ULTRA SHORT WARM INTRO: Para 1: Open with "I tried reaching your team directly but wanted to make sure this got to the right person." Then one sharp sentence about their specific pain: ' + pain + '. Para 2: ' + cs + ' Para 3: ' + offer + ' ' + rules;
  }

  if(variant === 'C') {
    return context + 'Write a cold email body for Jared at Frogfish Consulting to ' + title + ' at ' + company + ' (' + location + '). VARIANT C - LEAD WITH ROI NUMBER: Para 1: Open with a bold specific stat like "Most businesses in your space have 20-40% of their ad budget going to lead types that never convert - the platform has no idea which ones close." Then: ' + googleCred + ' Para 2: ' + cs + ' Para 3: ' + offer + ' ' + rules;
  }

  if(variant === 'D') {
    return context + 'Write a cold email body for Jared at Frogfish Consulting to ' + title + ' at ' + company + ' (' + location + '). VARIANT D - INTERNAL REFERRAL: Para 1: Open with exactly: "I spoke with ' + staffName + ' at your office last week - she suggested I reach out to you directly about your digital marketing." Then one sharp sentence on their pain: ' + pain + '. Para 2: ' + cs + ' Para 3: ' + offer + ' ' + rules;
  }

  return context + 'Write a cold email body for Jared at Frogfish Consulting to ' + title + ' at ' + company + ' (' + location + '). VARIANT A - RESEARCH-BASED PATTERN INTERRUPT: Para 1: Use the research above to write ONE sharp observation about ' + company + ' that connects directly to this pain: ' + pain + '. Make them think "how did they know that?" - not a summary of their website, but an insight about their specific situation. Weave in naturally: ' + googleCred + ' Para 2: ' + cs + ' Para 3: ' + offer + ' ' + rules;
}

function extractStaffName(websiteText) {
  // Look for common staff name patterns in website text
  // Find names that appear near words like "team", "staff", "associate", "coordinator", "assistant", "specialist", "paralegal", "admin"
  var juniorKeywords = ['coordinator', 'assistant', 'associate', 'specialist', 'paralegal', 'administrator', 'receptionist', 'office manager', 'analyst', 'consultant', 'representative', 'advisor'];
  var text = websiteText.toLowerCase();
  
  // Try to find a name near junior keywords
  for(var k=0; k<juniorKeywords.length; k++) {
    var idx = text.indexOf(juniorKeywords[k]);
    if(idx > 0) {
      // Look for a capitalized name in the 100 chars before the keyword
      var nearby = websiteText.slice(Math.max(0, idx-100), idx+50);
      var nameMatch = nearby.match(/\b([A-Z][a-z]{2,10})\s+([A-Z][a-z]{2,12})\b/);
      if(nameMatch) {
        // Make sure it's not a company name or title word
        var skipWords = ['About','Contact','Services','Our','The','Law','Group','LLC','Inc','Corp','Home','Meet','Team'];
        if(skipWords.indexOf(nameMatch[1])===-1) {
          return nameMatch[1]; // Return first name only
        }
      }
    }
  }
  return null; // No junior staff name found
}

async function researchCompany(domain) {
  if(!domain || domain === 'unknown.com') return '';
  try {
    var r = await fetch('/research/company', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({domain: domain})
    });
    var d = await r.json();
    return d.text || '';
  } catch(e) { return ''; }
}

async function generateEmails(leads) {
  log('Generating '+leads.length+' emails...','info');
  for(var i=0;i<leads.length;i++) {
    var l = leads[i];
    var n = NICHES.filter(function(x){ return x.id===l.niche; })[0]||NICHES[0];
    set({scanProg:Math.round(70+(i/leads.length)*30)});
    try {
      var websiteText = '';
      if(l.email) {
        var domain = l.email.split('@')[1];
        log('Researching '+domain+'...','info');
        websiteText = await researchCompany(domain);
      }
      var greeting = l.firstName ? 'Hi '+l.firstName+',' : 'Hi,';
      var staffName = websiteText ? extractStaffName(websiteText) : null;
      var availableVariants = staffName ? ['A','B','C','D'] : ['A','B','C'];
      var variant = availableVariants[Math.floor(Math.random()*availableVariants.length)];
      var prompt = makePrompt(l.company, l.title, l.location, n.pain, l.niche, websiteText, variant, staffName);
      var rawBody = await callAI(prompt);
      var cleanedBody = cleanBody(rawBody);
      // Multiple subject options per variant - randomly pick one
      var subjectPool = {
        A: [
          'Quick question - '+l.company,
          l.company+' and your cost per closed deal',
          'What your CRM data is telling you (that your ad platform isn\'t)',
          'The gap between your leads and your revenue',
          l.company+' - something I noticed'
        ],
        B: [
          l.company+' - quick thought',
          'Wanted to make sure this got to you',
          'Tried your website first',
          l.company+' - 2 minutes of your time'
        ],
        C: [
          'Your ad spend and your closed cases',
          '20-40% of your budget might be wasted',
          'What Google isn\'t telling you about your leads',
          'The ROI your campaigns are hiding'
        ],
        D: [
          'Following up - '+l.company,
          'Per my conversation with your team',
          'Quick follow up from last week',
          'Referred your way'
        ]
      };
      var pool = subjectPool[variant] || subjectPool['A'];
      var subject = pool[Math.floor(Math.random()*pool.length)];
      var fullEmail = 'Subject: '+subject+'\n\n'+greeting+'\n\n'+cleanedBody+'\n\nWorth a 20-min call?\n'+CALENDLY+'\n\nJared\nFrogfish Consulting';
      var item = {
        id: 'rq_'+l.id,
        leadId: l.id,
        company: l.company,
        contact: l.contact,
        firstName: l.firstName,
        title: l.title,
        email: l.email,
        niche: l.niche,
        location: l.location,
        body: fullEmail,
        variant: variant,
        status: 'pending',
        generatedAt: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
      };
      S.reviewQueue = S.reviewQueue.concat([item]);

async function approveEmail(id) {
  var item = S.reviewQueue.filter(function(x){ return x.id===id; })[0];
  if(!item) return;
  if(S.editingId===id) {
    var ta = document.getElementById('edit_'+id);
    if(ta) item.body = ta.value;
  }
  S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'sending'}) : x; });
  set({});

  // Extract subject and body from active variant
  var activeBody = (item.activeVariant==='B' && item.bodyB) ? item.bodyB : item.body;
  var lines = activeBody.split('\n');
  var subject = lines[0].replace('Subject: ','').trim();
  var emailBody = lines.slice(2).join('\n').trim();

  // Send via Instantly
  if(!S.keys.instantly) {
    var errMsg = 'Instantly not configured - add API key in Settings';
    log(errMsg,'error');
    S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:errMsg}) : x; });
    set({});
    return;
  }
  try {
    var r = await fetch('/instantly/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        instantlyKey: S.keys.instantly,
        to: item.email,
        subject: subject,
        body: emailBody
      })
    });
    var result = await r.json();
    if(result.error) {
      var errMsg = typeof result.error === 'object' ? JSON.stringify(result.error) : result.error;
      log('Send failed: '+errMsg,'error');
      S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:errMsg}) : x; });
      set({});
      return;
    }
    log('Sent to '+item.email+' via Instantly','success');
  } catch(e) {
    log('Instantly error: '+e.message,'error');
    S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:e.message}) : x; });
    set({});
    return;
  }

  S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'approved'}) : x; });
  S.editingId = null;
  S.sent = S.sent+1;
  if(item.variant && S.variantStats[item.variant]) S.variantStats[item.variant].sent++;
  if(item.email && S.seenEmails.indexOf(item.email)===-1) S.seenEmails.push(item.email);
  S.sentLog.unshift({email:item.email,company:item.company,contact:item.contact,title:item.title,variant:item.variant||'A',subject:(item.body||'').split('\n')[0].replace('Subject: ',''),sentAt:new Date().toLocaleString()});
  set({});
}

function rejectEmail(id) {
  S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'rejected'}) : x; });
  S.editingId = null;

}

  var rows = S.sentLog.map(function(e){return '<div style="display:grid;grid-template-columns:1.6fr 1.2fr 60px 1fr;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid #1a3320"><div><div style="font-size:12px;color:#c0e8c8">'+e.company+'</div><div style="font-size:10px;color:#2d5c3a">'+e.email+'</div></div><div style="font-size:11px;color:#9dc8a8">'+(e.contact||'')+'</div><div><span style="background:#0a0f0d;border:1px solid '+(variantColors[e.variant||'A']||'#4a7a58')+';color:'+(variantColors[e.variant||'A']||'#4a7a58')+';font-size:9px;padding:2px 8px;border-radius:2px">'+(e.variant||'A')+'</span></div><div style="font-size:10px;color:#2d5c3a">'+(e.sentAt||'')+'</div></div>';}).join('');
  return stats+'<div class="card"><div class="flex-between mb-12"><div class="label" style="color:#4ade80">Sent Log</div><button class="btn-ghost btn-sm" onclick="clearSentLog()">Clear</button></div>'+rows+'</div>';
}

async function doScan() {
  if(!S.keys.apollo){ log('Apollo API key not set - go to Settings','error'); set({}); return; }
  set({scanning:true, scanProg:0, lastError:null});
  log('Starting scan - '+S.dailyLimit+' companies, '+S.maxPerCompany+' contact each...','info');
  var all = [];
  for(var i=0;i<NICHES.length;i++) {
    var n = NICHES[i];
    set({scanProg:Math.round((i/NICHES.length)*70)});
    log('Querying Apollo for '+n.label+'...','info');
    try {
      var d = await apiPost('/apollo/search', {
        apolloKey: S.keys.apollo, page:S.apolloPage, per_page:10,
        person_titles: n.titles,
        q_organization_keyword_tags: n.industries,
        person_locations: ['United States'],
        organization_num_employees_ranges: ['10,50','51,200']
      });
      if(d.people && d.people.length>0) {
        var mapped = d.people.filter(function(p){ return p.email && p.email.indexOf('unknown')===-1; }).map(function(p,j){
          var fn = p.first_name || (p.name ? p.name.split(' ')[0] : '');
          var ln = p.last_name || (p.name ? p.name.split(' ').slice(1).join(' ') : '');
          return {
            id: Date.now()+i*100+j,
            company: (p.organization&&p.organization.name)||'Unknown',
            contact: (fn&&ln)?fn+' '+ln:(p.name||'Unknown'),
            firstName: fn||'',
            title: p.title||'Unknown',
            email: p.email,
            employees: String((p.organization&&p.organization.estimated_num_employees)||'?'),
            spend_signal: 'Apollo verified',
            score: scoreP(p),
            niche: n.id,
            location: (p.city&&p.state)?p.city+', '+p.state:'United States'
          };
        });
        all = all.concat(mapped);
        log(n.label+': '+mapped.length+' contacts found','success');
      } else {
        var err = d.error||d.message||d.parseError||JSON.stringify(d).slice(0,150);
        log(n.label+': 0 results - '+err,'info');
        set({lastError:'Apollo: '+err});
      }
    } catch(e){ log('Error: '+e.message,'error'); set({lastError:e.message}); }
    await new Promise(function(r){ setTimeout(r,400); });
  }
  set({scanProg:100});
  var limited = applyDailyLimits(all);
  // Only dedup against leads already in the leads list - allow new contacts through
  var existingEmails = new Set(S.leads.map(function(l){ return l.email; }));
  var fresh = limited.filter(function(l){ return l.email && l.email.indexOf('unknown')===-1 && !existingEmails.has(l.email); });
  S.apolloPage = S.apolloPage + 1;
  if(fresh.length>0) {
    set(function(s){ return {leads:s.leads.concat(fresh)}; });
    log('Found '+fresh.length+' new contacts - generating emails...','success');
    await generateEmails(fresh);
  } else {
    log('No new leads found - all contacts already seen','info');
    set({scanning:false, scanProg:0});
  }
}


function toggleAutoScan() {
  if(S.autoScan) {
    S.autoScan = false;
    if(S.autoScanInterval) { clearInterval(S.autoScanInterval); S.autoScanInterval = null; }
    log('Auto-scan paused','info');
    set({});
  } else {
    S.autoScan = true;
    log('Auto-scan ON - scanning every 60 minutes','success');
    doScan();
    S.autoScanInterval = setInterval(function(){ if(!S.scanning) doScan(); }, 60*60*1000);
    set({});
  }
}

// Poll for Instantly webhook events every 30 seconds
async function pollEvents() {
  try {
    var r = await fetch('/webhook/events');
    var events = await r.json();
    var updated = false;
    events.forEach(function(e) {
      var email = e.email || (e.lead && e.lead.email) || '';
      var eventType = e.event_type || e.type || '';
      // Find matching review item
      var item = S.reviewQueue.filter(function(x){ return x.email===email && x.status==='approved'; })[0];
      if(item && item.variant) {
        var v = item.variant;
        if(!S.variantStats[v]) S.variantStats[v] = {sent:0,opened:0,replied:0};
        if((eventType.indexOf('open')>=0 || eventType==='email_opened') && !item._opened) {
          S.variantStats[v].opened++;
          item._opened = true;
          updated = true;
        }
        if((eventType.indexOf('reply')>=0 || eventType==='email_replied') && !item._replied) {
          S.variantStats[v].replied++;
          item._replied = true;
          S.booked = S.booked; // could increment meetings if interested
          log('Reply received from '+email+' (Variant '+v+')','reply');
          updated = true;
        }
      }
    });
    if(updated) set({});
  } catch(e) {}
  setTimeout(pollEvents, 30000);
}
setTimeout(pollEvents, 5000);
