  var stored = localStorage.getItem('ff_auth');
  return stored === btoa(LOGIN_USER + ':' + LOGIN_PASS);

function doLogin() {
  var u = document.getElementById('login_user').value.trim().toLowerCase();

function cleanBody(raw) {
  return raw
    .replace(/^(hi\s[^\n]*\n+)/i, '')
    .replace(/\n+(best,?|regards,?|sincerely,?|cheers,?|thanks,?|warm regards,?)\s*\n[\s\S]*$/i, '')
    .replace(/\[your\s*name\]/gi, '')
    .replace(/\[name\]/gi, '')
    .replace(/\n*worth a (conversation|call|chat|quick call)[?.]*\s*$/i, '')
    .replace(/\n*let me know if[^\n]*$/i, '')
    .replace(/\n*would (you be|it be)[^\n]*\?\s*$/i, '')
    .replace(/\n*open to[^\n]*\?\s*$/i, '')
    .replace(/\n*happy to[^\n]*\?\s*$/i, '')
    .replace(/^\n+/, '')
    .replace(/\n+$/, '')
    .trim();
}

function scoreP(p) {
  var s = 50;
  var t = (p.title||'').toLowerCase();
  var org = p.organization || {};
  var employees = org.estimated_num_employees || 0;
  var industry = (org.industry||'').toLowerCase();
  var keywords = (org.keywords||[]).join(' ').toLowerCase();
  var technologies = (p.technologies||org.current_technologies||[]).map(function(x){ return (x.name||x||'').toLowerCase(); }).join(' ');

  // Title seniority - decision maker weight
  if(['ceo','founder','owner','managing partner','president'].some(function(x){ return t.indexOf(x)>=0; })) s+=20;
  else if(['cmo','vp','vice president','chief marketing'].some(function(x){ return t.indexOf(x)>=0; })) s+=17;
  else if(['director','head of','partner'].some(function(x){ return t.indexOf(x)>=0; })) s+=13;
  else if(['manager','lead','specialist'].some(function(x){ return t.indexOf(x)>=0; })) s+=6;

  // Verified email
  if(p.email && p.email.indexOf('unknown')===-1) s+=10;

  // Company size
  if(employees>=200) s+=12;
  else if(employees>=50) s+=10;
  else if(employees>=20) s+=7;
  else if(employees>=5) s+=3;

  // Google Ads / paid media tech stack signals
  if(technologies.indexOf('google ads')>=0 || technologies.indexOf('google adwords')>=0) s+=15;
  else if(technologies.indexOf('google tag manager')>=0 || technologies.indexOf('google analytics')>=0) s+=8;
  if(technologies.indexOf('facebook ads')>=0 || technologies.indexOf('meta ads')>=0) s+=8;
  if(technologies.indexOf('hubspot')>=0 || technologies.indexOf('salesforce')>=0 || technologies.indexOf('crm')>=0) s+=10;

  // Keywords suggesting active digital marketing
  if(keywords.indexOf('lead generation')>=0 || keywords.indexOf('digital marketing')>=0) s+=8;
  if(keywords.indexOf('paid search')>=0 || keywords.indexOf('ppc')>=0 || keywords.indexOf('sem')>=0) s+=10;
  if(keywords.indexOf('google ads')>=0 || keywords.indexOf('adwords')>=0) s+=8;

  // Industry fit
  if(industry.indexOf('legal')>=0 || industry.indexOf('law')>=0) s+=8;
  if(industry.indexOf('insurance')>=0 || industry.indexOf('financial')>=0) s+=7;
  if(industry.indexOf('hvac')>=0 || industry.indexOf('roofing')>=0 || industry.indexOf('plumbing')>=0 || industry.indexOf('home services')>=0) s+=7;
  if(industry.indexOf('solar')>=0 || industry.indexOf('real estate')>=0) s+=6;

  // Revenue signals
  var revenue = org.annual_revenue_printed || org.annual_revenue || 0;
  if(typeof revenue === 'string') {
    if(revenue.indexOf('M')>=0) s+=10;
    else if(revenue.indexOf('K')>=0) s+=5;
  } else if(revenue > 1000000) s+=10;
  else if(revenue > 500000) s+=6;

  // Job posting signals - actively hiring for paid media = high ad spend
  var jobPostings = (org.job_postings || []).map(function(j){ return (j.title||j||'').toLowerCase(); }).join(' ');
  if(jobPostings.indexOf('google ads')>=0 || jobPostings.indexOf('paid search')>=0 || jobPostings.indexOf('ppc')>=0 || jobPostings.indexOf('sem manager')>=0) s+=18;
  else if(jobPostings.indexOf('digital marketing manager')>=0 || jobPostings.indexOf('performance marketing')>=0) s+=14;
  else if(jobPostings.indexOf('marketing manager')>=0 || jobPostings.indexOf('demand generation')>=0) s+=10;
  else if(jobPostings.indexOf('marketing')>=0) s+=5;

  // Also flag in spend_signal for display
  if(jobPostings.indexOf('google ads')>=0 || jobPostings.indexOf('paid search')>=0 || jobPostings.indexOf('ppc')>=0) {
    p._jobSignal = 'Hiring: Paid Search';
  } else if(jobPostings.indexOf('digital marketing')>=0 || jobPostings.indexOf('performance marketing')>=0) {
    p._jobSignal = 'Hiring: Digital Mktg';
  }

  return Math.min(s, 99);
}

function applyPullLimits(leads) {
  var counts = {};
  var result = [];
  for(var i=0; i<leads.length; i++) {
    var l = leads[i];
    if(result.length >= S.pullLimit) break;
    var co = l.company.toLowerCase();
    if(!counts[co]) counts[co] = 0;
    if(counts[co] < S.maxPerCompany) {
      counts[co]++;
      result.push(l);
    }
  }
  return result;
}

  // Build search finding line if available

  if(searchAudit && !searchAudit.error && !searchAudit.found) {
    var nicheLabel = niche==='legal' ? 'personal injury law firms' : niche==='home' ? 'home service companies' : 'financial advisors';
    if(searchAudit.topCompetitors && searchAudit.topCompetitors.length > 0) {
      var competitors = searchAudit.topCompetitors.slice(0,2).join(' and ');
      searchLine = 'IMPORTANT SEARCH FINDING: I searched for ' + nicheLabel + ' in their area and ' + company + ' did not appear — ' + competitors + ' did. Open the email with this specific observation naturally, naming the actual competitors. Example: "I was looking up ' + nicheLabel + ' in your area and noticed ' + company + ' wasn\'t coming up — ' + competitors + ' were." ';
    } else {
      searchLine = 'IMPORTANT SEARCH FINDING: I searched for ' + nicheLabel + ' in their area and ' + company + ' did not appear in the results. Open with this naturally — something like "I was looking up ' + nicheLabel + ' in your area and noticed ' + company + ' wasn\'t showing up in the results." ';
    }
  }

  var rules = 'RULES: 3 complete paragraphs, max 2 sentences each. CRITICAL: Every sentence must end with a period — never cut off. Sound like a real person — not a sales email. No exclamation marks. No corporate speak. No closing question, no CTA, no Calendly link — added separately. OUTPUT PARAGRAPHS ONLY — no greeting, no signature, no subject line, no labels.';

  // VARIANT A - Search audit opener
  if(variant === 'A') {
    return searchLine + 'Write a cold email body for ' + role + ' to ' + title + ' at ' + company + ' (' + location + '). '
      + 'Para 1: ' + (searchLine ? 'Use the search finding above as a natural warm opener.' : 'Open with "Hope you are having a good week."') + ' '
      + 'Para 2: Jared is ' + positioning + '. '
      + 'Para 3: "Thought there might be a fit — happy to show you what we have built." '
      + rules;
  }

  // VARIANT B - Direct with search finding if available
  if(variant === 'B') {
    return searchLine + 'Write a cold email body for ' + role + ' to ' + title + ' at ' + company + ' (' + location + '). '
      + 'Para 1: ' + (searchLine ? 'Open with the search finding naturally.' : 'Get straight to the point.') + ' Jared is ' + positioning + '. '
      + 'Para 2: One sentence — we help firms figure out which ad spend is driving real closed business vs leads that never convert. '
      + 'Para 3: Happy to show you what we have built. '
      + rules;
  }

  // VARIANT C - Front desk referral
  if(variant === 'C') {
    var refLine = staffName
      ? 'I spoke with ' + staffName + ' at your front desk yesterday — they said to email you directly.'
      : 'I spoke with someone at your front desk yesterday — they said to email you directly.';
    return 'Write a cold email body for ' + role + ' to ' + title + ' at ' + company + ' (' + location + '). '
      + 'Para 1: Open with exactly: "' + refLine + '" '
      + 'Para 2: Jared is ' + positioning + '. Thought there might be a fit. '
      + (searchLine ? 'Also naturally mention: ' + searchLine : '')
      + rules;
  }

  return searchLine + 'Write a short 2 paragraph cold email for ' + role + ' to ' + title + ' at ' + company + '. Jared is ' + positioning + '. ' + rules;
}


function extractStaffName(websiteText) {
  var juniorKeywords = ['coordinator', 'assistant', 'associate', 'specialist', 'paralegal', 'administrator', 'receptionist', 'office manager', 'analyst', 'consultant', 'representative', 'advisor'];
  // Words that are NOT person names - UI elements, common words, tech terms
  var skipWords = [
    'About','Contact','Services','Our','The','Law','Group','LLC','Inc','Corp','Home','Meet','Team',
    'Toggle','Menu','Search','Login','Submit','Cancel','Close','Open','Back','Next','Skip','More',
    'Learn','Read','View','Click','Here','This','That','With','From','Your','Their','These','Those',
    'Email','Phone','Address','Location','Office','Suite','Floor','Building','Street',
    'Google','Facebook','Twitter','LinkedIn','Instagram','Youtube','Apple','Microsoft',
    'Privacy','Policy','Terms','Cookie','Copyright','Rights','Reserved',
    'Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
    'January','February','March','April','June','July','August','September','October','November','December'
  ];
  // Valid first names must be 3-10 chars, only letters, not in skip list
  var commonFirstNames = ['James','John','Robert','Michael','William','David','Richard','Joseph','Thomas','Charles','Christopher','Daniel','Matthew','Anthony','Donald','Mark','Paul','Steven','Andrew','Kenneth','Joshua','Kevin','Brian','George','Timothy','Ronald','Edward','Jason','Jeffrey','Ryan','Jacob','Gary','Nicholas','Eric','Jonathan','Stephen','Larry','Justin','Scott','Brandon','Benjamin','Samuel','Raymond','Gregory','Frank','Alexander','Patrick','Jack','Dennis','Jerry','Tyler','Aaron','Jose','Adam','Henry','Douglas','Nathan','Peter','Zachary','Kyle','Walter','Harold','Jeremy','Ethan','Carl','Arthur','Jesse','Lawrence','Dylan','Joe','Bryan','Jordan','Albert','Wayne','Billy','Steve','Louis','Ralph','Roy','Eugene','Russell','Bobby','Harry','Sean','Philip','Craig','Alan','Juan','Willie','Randy','Howard','Stanley','Leonard','Victor','Martin','Ernest','Jimmy','Todd','Travis','Roger','Fred','Terry','Raymond','Mary','Patricia','Jennifer','Linda','Barbara','Elizabeth','Susan','Jessica','Sarah','Karen','Lisa','Nancy','Betty','Margaret','Sandra','Ashley','Dorothy','Kimberly','Emily','Donna','Michelle','Carol','Amanda','Melissa','Deborah','Stephanie','Rebecca','Sharon','Laura','Cynthia','Kathleen','Amy','Angela','Shirley','Anna','Brenda','Pamela','Emma','Nicole','Helen','Samantha','Katherine','Christine','Debra','Rachel','Carolyn','Janet','Catherine','Maria','Heather','Diane','Julie','Joyce','Victoria','Kelly','Christina','Lauren','Joan','Evelyn','Olivia','Judith','Megan','Cheryl','Martha','Andrea','Frances','Hannah','Jacqueline','Ann','Gloria','Teresa','Kathryn','Sara','Janice','Julia','Marie','Madison','Grace','Judy','Theresa','Beverly','Denise','Marilyn','Amber','Danielle','Brittany','Diana','Abigail','Jane','Natalie','Lori','Tiffany','Alexis','Kayla'];
  
  var text = websiteText.toLowerCase();
  for(var k=0; k<juniorKeywords.length; k++) {
    var idx = text.indexOf(juniorKeywords[k]);
    if(idx > 0) {
      var nearby = websiteText.slice(Math.max(0, idx-150), idx+50);
      var nameMatch = nearby.match(/\b([A-Z][a-z]{2,9})\s+([A-Z][a-z]{2,12})\b/);
      if(nameMatch) {
        var firstName = nameMatch[1];
        // Must be a known first name AND not in skip words
        if(commonFirstNames.indexOf(firstName) !== -1 && skipWords.indexOf(firstName) === -1) {
          return firstName;
        }
      }
    }
  }
  return null;
}

async function approveEmail(id) {
  var item = S.reviewQueue.filter(function(x){ return x.id===id; })[0];
  if(!item) return;
  if(S.editingId===id) {
    var ta = document.getElementById('edit_'+id);
    if(ta) item.body = ta.value;
  }
  S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'sending'}) : x; });
  set({});

  // Extract subject and body from active variant
  var activeBody = (item.activeVariant==='B' && item.bodyB) ? item.bodyB : item.body;
  // Extract subject and body - handle both escaped and real newlines
  var normalizedBody = activeBody.replace(/\\n/g, '\n');
  var lines = normalizedBody.split('\n');
  var subject = lines[0].replace('Subject: ','').trim();
  var emailBody = lines.slice(2).join('\n').trim();
  // Send via Instantly
  if(!S.keys.instantly) {
    var errMsg = 'Instantly not configured - add API key in Settings';
    log(errMsg,'error');
    S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:errMsg}) : x; });
    set({});
    return;
  }
  try {
    var r = await fetch('/gmail/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        to: item.email,
        subject: subject,
        body: emailBody,
        firstName: item.firstName,
        company: item.company,
        niche: item.niche,
        instantlyKey: S.keys.instantly
      })
    });
    var result = await r.json();
    if(result.error) {
      var errMsg = typeof result.error === 'object' ? JSON.stringify(result.error) : result.error;
      log('Send failed: '+errMsg,'error');
      S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:errMsg}) : x; });
      set({});
      return;
    }
    log('Sent to '+item.email+' via Instantly','success');
  } catch(e) {
    log('Instantly error: '+e.message,'error');
    S.reviewQueue = S.reviewQueue.map(function(x){ return x.id===id ? Object.assign({},x,{status:'failed',sendError:e.message}) : x; });
    set({});
    return;
  }

  // Remove from queue, add to sent log
  S.reviewQueue = S.reviewQueue.filter(function(x){ return x.id!==id; });
  S.editingId = null;
  S.sent = S.sent+1;
  if(item.variant && S.variantStats[item.variant]) S.variantStats[item.variant].sent++;
  if(item.email && S.seenEmails.indexOf(item.email)===-1) S.seenEmails.push(item.email);
  S.sentLog.unshift({email:item.email,company:item.company,contact:item.contact,title:item.title,variant:item.variant||'A',subject:(item.body||'').split('\n')[0].replace('Subject: ',''),sentAt:new Date().toLocaleString(),emailId:result&&result.emailId?result.emailId:null,opens:0,clicks:0});
  set({});
  saveStateToServer();
}

    +'<div class="grid-12">'
    +'<div class="card"><div class="flex-between mb-12"><div class="label" style="color:#4ade80">Agent Log</div><span style="font-size:10px;color:'+(S.scanning?'#4ade80':'#2d5c3a')+'">'+(S.scanning?'SCANNING':'IDLE')+'</span></div><div class="log-scroll">'+logHtml+'</div></div>'

}

function pageReview() {
  var pending = S.reviewQueue.filter(function(x){ return x.status==='pending'; });
  var approved = S.reviewQueue.filter(function(x){ return x.status==='approved'; });
  var rejected = S.reviewQueue.filter(function(x){ return x.status==='rejected'; });
  if(S.reviewQueue.length===0) {
    return '<div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">&#128203;</div><div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:#4ade80;margin-bottom:8px">Review Queue Empty</div><div style="font-size:12px;color:#4a7a58;margin-bottom:20px">Run a daily scan to pull leads and generate emails.</div><button class="btn" onclick="go(\'dashboard\')">Go to Dashboard</button></div>';
  }
  var summary = '<div class="card mb-16"><div class="flex-between"><div><div class="label" style="color:#4ade80;margin-bottom:8px">Review Queue - '+S.reviewQueue.length+' Emails</div>'
    +'<div style="display:flex;gap:16px"><span style="font-size:11px;color:#fbbf24">&#9679; '+pending.length+' pending</span><span style="font-size:11px;color:#4ade80">&#10003; '+approved.length+' approved</span><span style="font-size:11px;color:#f87171">&#10007; '+rejected.length+' rejected</span></div></div>'
    +(pending.length>1?'<button class="btn-approve" onclick="approveAll()">&#9989; Approve All ('+pending.length+')</button>':'')
    +'<button class="btn-ghost btn-sm" style="margin-left:8px" onclick="S.reviewQueue=[];set({});">&#128465; Reset Queue</button>'
  var cards = S.reviewQueue.map(function(item) {
    var isEditing = S.editingId===item.id;
    var lines = item.body.split('\n');
    var subjectLine = lines[0].replace('Subject: ','');
    var emailBody = lines.slice(2).join('\n');
    var variantColors = {A:'#4ade80',B:'#7dd3fc',C:'#fbbf24',D:'#c4b5fd'};
  var variantBadge = item.variant ? '<span style="background:#0a0f0d;border:1px solid '+(variantColors[item.variant]||'#4a7a58')+';color:'+(variantColors[item.variant]||'#4a7a58')+';font-size:9px;padding:2px 8px;border-radius:2px;font-family:DM Mono,monospace;letter-spacing:.1em">VARIANT '+item.variant+'</span>' : '';
  var pill = item.status==='pending'?'<span class="status-pill pill-pending">Pending Review</span>':
    item.status==='sending'?'<span class="status-pill pill-pending"><span class="pulse">&#9679;</span> Sending...</span>':
    item.status==='approved'?'<span class="status-pill pill-approved">&#10003; Sent</span>':
    item.status==='failed'?'<span class="status-pill pill-failed">&#9888; Send Failed</span>':
    '<span class="status-pill pill-rejected">&#10007; Rejected</span>';
    var actions = item.status==='pending' ? '<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +(isEditing
        ?'<button class="btn-approve" onclick="saveEdit(\''+item.id+'\')">Save</button><button class="btn-ghost btn-sm" onclick="set({editingId:null})">Cancel</button>'
        :'<button class="btn-approve" onclick="approveEmail(\''+item.id+'\')">&#9989; Approve + Send</button><button class="btn-ghost btn-sm" onclick="set({editingId:\''+item.id+'\'})">&#9998; Edit</button><button class="btn-reject" onclick="rejectEmail(\''+item.id+'\')">&#10007; Reject</button>'
      )+'</div>' : '';
    return '<div class="review-card '+item.status+'">'
      +'<div class="flex-between mb-12"><div>'
      +'<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:'+(item.status==='approved'?'#4ade80':item.status==='rejected'?'#f87171':'#c0e8c8')+'">'+item.company+'</div>'
      +'<div style="font-size:12px;color:#c0e8c8;margin-top:3px">'+(item.contact!=='Unknown'?item.contact:'')+'</div>'
      +'<div style="font-size:11px;color:#4ade80;margin-top:2px">'+item.title+'</div>'
      +'<div style="font-size:10px;color:#2d5c3a;margin-top:2px">'+item.email+'</div>'
      +'</div><div style="display:flex;align-items:center;gap:8px">'+pill+'<span style="font-size:9px;color:#2d5c3a">'+item.generatedAt+'</span> <button onclick="searchLead(\''+item.niche+'\',\''+encodeURIComponent(item.location||'')+'\');" style="background:none;border:1px solid #1a3320;color:#4a7a58;font-size:9px;padding:2px 8px;border-radius:2px;cursor:pointer;font-family:DM Mono,monospace">&#128269; Search</button></div></div>'
      +'<div style="background:#060c08;border:1px solid #1a3320;border-radius:2px;padding:12px 14px;margin-bottom:12px"><div style="font-size:9px;color:#2d5c3a;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px">Subject</div><div style="font-size:12px;color:#4ade80">'+subjectLine+'</div></div>'
      +(isEditing
        ?'<div style="margin-bottom:12px"><textarea id="edit_'+item.id+'" class="email-edit">'+item.body+'</textarea></div>'
        :'<div class="email-box" style="max-height:200px;margin-bottom:12px;font-size:11px">'+emailBody+'</div>'
      )
      +(item.status==='failed' && item.sendError ? '<div style="background:#1a0a0a;border:1px solid #fbbf24;border-radius:2px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#fbbf24">&#9888; Send failed: '+item.sendError+'<br><button class="btn btn-sm" style="margin-top:6px" onclick="retryEmail(\''+item.id+'\')" >Retry</button></div>' : '')+actions+'</div>';
  }).join('');
  return summary+cards;
}

function pageLeads() {

      +'<div><div style="font-size:11px;color:#9dc8a8">'+(l.firstName?l.firstName+' '+(l.contact.split(' ').slice(1).join(' '))||l.contact:l.contact)+'</div><div style="font-size:10px;color:#2d5c3a">'+l.title+'</div></div>'
      +'<div style="font-size:10px;color:#4a7a58">'+l.location+'</div>'

      +'<div style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;color:'+(l.score>88?'#4ade80':'#7dd3fc')+'">'+l.score+'</div>'
      +(function(){
        var wasSent = S.sentLog.some(function(s){ return s.email===l.email; });
        var inQueue = S.reviewQueue.some(function(q){ return q.email===l.email && q.status==='pending'; });
        var isSkipped = l.skipped;
        if(wasSent) return '<span style="font-size:9px;color:#4ade80;padding:5px 10px;border:1px solid #1a5c2e;border-radius:2px">&#10003; Sent</span>';
        if(inQueue) return '<span style="font-size:9px;color:#fbbf24;padding:5px 10px;border:1px solid #4a3800;border-radius:2px">&#9679; In Queue</span>';
        if(isSkipped) return '<span style="font-size:9px;color:#f87171;padding:5px 10px;border:1px solid #5c1a1a;border-radius:2px;cursor:pointer" onclick="event.stopPropagation();skipLead('+l.id+',false)">&#10007; Skipped</span>';
        return '<div style="display:flex;gap:4px"><button class="btn btn-sm" style="font-size:9px;padding:5px 8px" onclick="event.stopPropagation();singleGen('+l.id+')">+ Email</button><button style="background:none;border:1px solid #4a3820;color:#a07050;font-family:DM Mono,monospace;font-size:9px;padding:5px 8px;cursor:pointer;border-radius:2px" onclick="event.stopPropagation();skipLead('+l.id+',true)">Skip</button></div>';
      })()
      +'</div></div>';
  }).join('');
  return '<div style="display:grid;grid-template-columns:'+(sl?'1fr 1fr':'1fr')+';gap:20px">'
    +'<div class="card"><div class="flex-between mb-16"><div class="label" style="color:#4ade80">Lead Queue - '+S.leads.length+' Leads</div><button class="btn btn-sm" onclick="doScan()" '+(S.scanning?'disabled':'')+'>+ Scan Apollo</button></div>'
    +'<div class="col-header" style="grid-template-columns:1.8fr 1.4fr 1fr .7fr 50px 110px"><span>Company</span><span>Contact</span><span>Location</span><span>Niche</span><span>Score</span><span>Action</span></div>'
    +rows+'</div>'
    +(sl?'<div class="card"><div class="flex-between mb-16"><div class="label" style="color:#4ade80">Lead Detail</div><button onclick="set({selLead:null})" style="background:none;border:none;color:#2d5c3a;cursor:pointer;font-size:18px">&#10005;</button></div>'
      +'<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:#4ade80;margin-bottom:4px">'+sl.company+'</div>'
      +'<div style="font-size:12px;color:#c0e8c8;margin-bottom:2px">'+(sl.firstName||sl.contact)+'</div>'
      +'<div style="font-size:11px;color:#4ade80;margin-bottom:2px">'+sl.title+'</div>'
      +'<div style="font-size:11px;color:#2d5c3a;margin-bottom:16px">'+sl.email+'</div>'
      +'<div class="grid-2 mb-16">'
      +[['Employees',sl.employees],['Location',sl.location],['Score',sl.score+'/100'],['Signals',sl.spend_signal]].map(function(x){
        return '<div style="background:#060c08;border:1px solid #1a3320;padding:10px 14px;border-radius:2px"><div class="label">'+x[0]+'</div><div style="font-size:11px;color:#b0d4b8">'+x[1]+'</div></div>';
      }).join('')+'</div>'
      +'<button class="btn" style="width:100%" onclick="singleGen('+sl.id+')">&#10024; Generate Email for Review</button></div>':'')
    +'</div>';
}

function pageSent() {

async function doScan() {
  if(!S.keys.apollo){ log('Apollo API key not set - go to Settings','error'); set({}); return; }
  set({scanning:true, scanProg:0, lastError:null});
  log('Starting scan - '+S.pullLimit+' leads, 1 email each...','info');
  var all = [];
  for(var i=0;i<NICHES.length;i++) {
    var n = NICHES[i];
    set({scanProg:Math.round((i/NICHES.length)*70)});
    log('Querying Apollo for '+n.label+'...','info');
    try {
      var d = await apiPost('/apollo/search', {
        apolloKey: S.keys.apollo, page:S.apolloPage, per_page:20,
        person_titles: n.titles,
        q_organization_keyword_tags: n.industries,
        person_locations: ['United States'],
        organization_num_employees_ranges: ['10,50','51,200']
      });
      if(d.people && d.people.length>0) {
        var mapped = d.people.filter(function(p){ return p.email ? p.email.indexOf('unknown')===-1 : p.has_email; }).map(function(p,j){
          var fn = p.first_name || (p.name ? p.name.split(' ')[0] : '');
          var ln = p.last_name || (p.name ? p.name.split(' ').slice(1).join(' ') : '');
          return {
            id: Date.now()+i*100+j,
            company: (p.organization&&p.organization.name)||'Unknown',
            contact: (fn&&ln)?fn+' '+ln:(p.name||'Unknown'),
            firstName: fn||'',
            title: p.title||'Unknown',
            email: p.email,
            employees: String((p.organization&&p.organization.estimated_num_employees)||'?'),
            spend_signal: p._jobSignal || 'Apollo verified',
            score: scoreP(p),
            niche: n.id,
            location: (p.city&&p.state)?p.city+', '+p.state:'United States'
          };
        });
        all = all.concat(mapped);
        log(n.label+': '+mapped.length+' contacts found','success');
      } else {
        var err = d.error||d.message||d.parseError||JSON.stringify(d).slice(0,300);
        log(n.label+': 0 results - '+err,'error');
        console.log('Apollo response:', JSON.stringify(d).slice(0,500));
        set({lastError:'Apollo: '+err});
      }
    } catch(e){ log('Error: '+e.message,'error'); set({lastError:e.message}); }
    await new Promise(function(r){ setTimeout(r,400); });
  }
  set({scanProg:100});
  var limited = applyPullLimits(all);
  // Build comprehensive dedup set from leads + sentLog
  // Only dedup against sent emails - leads list gets cleared each scan
  var existingEmails = new Set(S.sentLog.map(function(s){ return s.email; }));
  S.leads = []; // Clear old leads so fresh ones come in
  var fresh = limited.filter(function(l){
    return l.email && l.email.indexOf('unknown')===-1 && !existingEmails.has(l.email);
  });
  // Always increment page so next scan pulls different results
  S.apolloPage = S.apolloPage + 1;
  if(fresh.length>0) {
    set(function(s){ return {leads:s.leads.concat(fresh)}; });
    log('Found '+fresh.length+' new contacts - generating emails...','success');
    await generateEmails(fresh);
  } else {
    log('No new contacts on page '+( S.apolloPage-1)+' - moved to page '+S.apolloPage+'. Scan again for next batch.','info');
    set({scanning:false, scanProg:0});
  }
}


function startScheduledScan() {
  if(S.autoScanTimer) clearInterval(S.autoScanTimer);
  S.autoScanTimer = setInterval(function(){
    var now = new Date();
    var timeStr = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    if(timeStr === S.scheduledTime && !S.scanning) {
      log('Scheduled scan starting...','success');
      doScan();
    }
  }, 60000); // check every minute
}

function toggleAutoScan() {
  if(S.autoScan) {
    S.autoScan = false;
    if(S.autoScanInterval) { clearInterval(S.autoScanInterval); S.autoScanInterval = null; }
    log('Auto-scan paused','info');
    set({});
  } else {
    S.autoScan = true;
    log('Auto-scan ON - will scan daily at '+S.scheduledTime,'success');
    startScheduledScan();
    doScan(); // run immediately first time
    set({});
  }
}

// Poll for Instantly webhook events every 30 seconds
async function pollEvents() {
  try {
    // Fetch open/click tracking stats
    var trackRes = await fetch('/track/stats');
    var trackData = await trackRes.json();
    var trackUpdated = false;
    Object.keys(trackData).forEach(function(email) {
      var logItem = S.sentLog.filter(function(s){ return s.email===email; })[0];
      if(logItem) {
        if(trackData[email].opens > 0 && !logItem.opened) { logItem.opened = true; trackUpdated = true; }
        if(trackData[email].clicks > 0 && !logItem.clicked) { logItem.clicked = true; trackUpdated = true; }
      }
    });
    if(trackUpdated) set({});
  } catch(e) {}
  try {
    // Check if backend scheduler triggered a scan
    var schedRes = await fetch('/scheduler/status');
    var schedData = await schedRes.json();
    if(schedData.triggered && !S.scanning) {
      log('Backend scheduler triggered - starting autonomous scan...','success');
      doScan();
    }
    // Sync scheduler config
    if(schedData.config && schedData.config.enabled !== S.autoScan) {
      S.autoScan = schedData.config.enabled;
      S.autoApprove = schedData.config.enabled;
      if(schedData.config.time) S.scheduledTime = schedData.config.time;
    }
  } catch(e) {}
  try {
    // Check Gmail connection status
    var statusRes = await fetch('/gmail/status');
    var status = await statusRes.json();
    if(status.connected !== S.gmailConnected) {
      S.gmailConnected = status.connected;
      set({});
    }
    // Check for Gmail replies if connected
    if(S.gmailConnected && S.sentLog.length > 0) {
      var recentSent = S.sentLog.slice(0, 20);
      var replyRes = await fetch('/gmail/check-replies', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({sentEmails: recentSent})
      });
      var replyData = await replyRes.json();
      if(replyData.replies && replyData.replies.length > 0) {
        var newReplies = false;
        replyData.replies.forEach(function(r) {
          // Check if we already have this reply stored
          var exists = S.replies.some(function(x){ return x.messageId===r.messageId; });
          if(!exists) {
            S.replies.unshift(Object.assign({}, r, {read: false, receivedAt: new Date().toLocaleString()}));
            newReplies = true;
            log('Reply from '+r.email+'!','reply');
          }
          // Mark sent log item as replied
          var logItem = S.sentLog.filter(function(s){ return s.email===r.email; })[0];
          if(logItem && !logItem.replied) {
            logItem.replied = true;
            if(logItem.variant && S.variantStats[logItem.variant]) S.variantStats[logItem.variant].replied++;
          }
        });
        if(newReplies) set({});
      }
    }
    var r = await fetch('/webhook/events');
    var events = await r.json();
    var updated = false;
    events.forEach(function(e) {
      var email = e.email || (e.lead && e.lead.email) || '';
      var eventType = e.event_type || e.type || '';
      // Find matching review item
      var item = S.reviewQueue.filter(function(x){ return x.email===email && x.status==='approved'; })[0];
      if(item && item.variant) {
        var v = item.variant;
        if(!S.variantStats[v]) S.variantStats[v] = {sent:0,opened:0,replied:0};
        if((eventType.indexOf('open')>=0 || eventType==='email_opened') && !item._opened) {
          S.variantStats[v].opened++;
          item._opened = true;
          updated = true;
        }
        if((eventType.indexOf('reply')>=0 || eventType==='email_replied') && !item._replied) {
          S.variantStats[v].replied++;
          item._replied = true;
          S.booked = S.booked; // could increment meetings if interested
          log('Reply received from '+email+' (Variant '+v+')','reply');
          updated = true;
        }
      }
    });
    if(updated) set({});
  } catch(e) {}
  // Poll tracking stats
  try {
    var trackRes = await fetch('/track/stats');
    var trackData = await trackRes.json();
    var trackUpdated = false;
    S.sentLog.forEach(function(e) {
      if(e.emailId && trackData[e.emailId]) {
        var t = trackData[e.emailId];
        if(t.opens > (e.opens||0) || t.clicks > (e.clicks||0)) {
          e.opens = t.opens || 0;
          e.clicks = t.clicks || 0;
          trackUpdated = true;
        }
      }
    });
    if(trackUpdated) set({});
  } catch(e) {}
  setTimeout(pollEvents, 30000);
}
setTimeout(pollEvents, 5000);
