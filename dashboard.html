<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Frogfish BD Agent 🐸</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Mono','Courier New',monospace;background:#0a0f0d;color:#e2ffe8;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0f0d}::-webkit-scrollbar-thumb{background:#1a5c2e;border-radius:2px}
.header{border-bottom:1px solid #1a3320;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;background:#060c08;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:16px}.logo-icon{width:32px;height:32px;background:#1a5c2e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#4ade80;letter-spacing:.05em}.logo-sub{font-size:9px;color:#2d5c3a;letter-spacing:.2em;text-transform:uppercase}
.tabs{border-bottom:1px solid #1a3320;padding:0 28px;background:#060c08;display:flex;position:sticky;top:65px;z-index:9}
.tab{background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:10px 18px;color:#4a7a58;transition:all .2s}
.tab.active{color:#4ade80;border-bottom-color:#4ade80}.tab:hover{color:#a3e4b0}
.tab-badge{background:#f87171;color:#0a0f0d;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:5px;font-family:'Syne',sans-serif}
.content{padding:24px 28px;max-width:1200px}.card{background:#0e1a12;border:1px solid #1a3320;border-radius:3px;padding:20px;margin-bottom:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.grid-12{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}
.label{font-size:9px;color:#2d5c3a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px}
.stat-num{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:#4ade80;line-height:1}
.btn{background:#1a5c2e;border:1px solid #4ade80;color:#4ade80;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover{background:#4ade80;color:#0a0f0d}.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}.btn-sm{padding:7px 14px;font-size:10px}
.btn-approve{background:#1a5c2e;border:1px solid #4ade80;color:#4ade80;font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:.08em;text-transform:uppercase}
.btn-approve:hover{background:#4ade80;color:#0a0f0d}
.btn-reject{background:none;border:1px solid #f87171;color:#f87171;font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:.08em;text-transform:uppercase}
.btn-reject:hover{background:#f87171;color:#0a0f0d}
.btn-danger{background:none;border:1px solid #f87171;color:#f87171;font-family:'DM Mono',monospace;font-size:11px;padding:10px 20px;cursor:pointer;border-radius:2px}
.btn-danger:hover{background:#f87171;color:#0a0f0d}
.btn-ghost{background:none;border:1px solid #4a7a58;color:#4a7a58;font-family:'DM Mono',monospace;font-size:11px;padding:10px 20px;cursor:pointer;border-radius:2px}
.btn-ghost:hover{background:#4a7a58;color:#0a0f0d}
.log-entry{border-left:2px solid;padding:6px 12px;margin-bottom:5px;font-size:11px;border-radius:0 2px 2px 0}.log-scroll{max-height:320px;overflow-y:auto}
.score-bar{height:4px;background:#1a3320;border-radius:2px;overflow:hidden;margin-top:4px}.score-fill{height:100%;border-radius:2px}
.lead-row{border-bottom:1px solid #1a3320;padding:13px 0;cursor:pointer;transition:background .15s}.lead-row:hover{background:#0d2a14}
.email-box{background:#060c08;border:1px solid #1a3320;border-radius:2px;padding:16px;font-size:12px;line-height:1.8;color:#b0d4b8;white-space:pre-wrap;min-height:160px;max-height:320px;overflow-y:auto}
.email-edit{background:#060c08;border:1px solid #4ade80;border-radius:2px;padding:16px;font-size:12px;line-height:1.8;color:#b0d4b8;white-space:pre-wrap;min-height:200px;max-height:400px;overflow-y:auto;width:100%;resize:vertical;font-family:'DM Mono',monospace;outline:none}
.progress-bar{height:2px;background:#1a3320;border-radius:1px;overflow:hidden;margin:8px 0}.progress-fill{height:100%;background:linear-gradient(90deg,#1a5c2e,#4ade80);transition:width .4s}
input{background:#060c08;border:1px solid #1a3320;color:#e2ffe8;font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;border-radius:2px;width:100%;outline:none}
input:focus{border-color:#4ade80}.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.error-banner{background:#1a0a0a;border:1px solid #f87171;border-radius:3px;padding:14px 16px;margin-bottom:16px}
.pulse{animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.col-header{font-size:9px;color:#2d5c3a;letter-spacing:.15em;text-transform:uppercase;padding:6px 0 10px;border-bottom:1px solid #1a3320;display:grid;gap:8px}
.review-card{background:#0e1a12;border:1px solid #1a3320;border-radius:3px;padding:20px;margin-bottom:12px;transition:border-color .2s}
.review-card.approved{border-color:#4ade80;background:#0a1f0d}
.review-card.rejected{border-color:#f87171;background:#1a0a0a;opacity:.6}
.status-pill{display:inline-block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:2px;font-family:'DM Mono',monospace}
.pill-pending{background:#1a3320;color:#4a7a58;border:1px solid #1a3320}
.pill-approved{background:#0a2a10;color:#4ade80;border:1px solid #4ade80}
.pill-rejected{background:#2a0a0a;color:#f87171;border:1px solid #f87171}
.pill-sent{background:#0a1a2a;color:#7dd3fc;border:1px solid #7dd3fc}
</style>
</head>
<body>
<div id="app"></div>
<script>
var CALENDLY='https://calendly.com/frogfishconsulting/discovery';
var CTX='You are the AI BD Rep for Frogfish Consulting. Founded by ex-Google employee, 10+ years experience. Digital Maturity Consulting connecting offline CRM data to digital campaigns. Services: Paid Media, SEO/Content, Digital Intelligence/Dashboards/CRM Integration. Target: businesses driving leads online but closing offline. VALUE PROP: Most agencies optimize for leads. We optimize for revenue. CASE STUDY 1 (home services/solar/healthcare): Home services company, no revenue visibility from ads. We built BI dashboard. Found campaign eating 30% of budget with zero closed jobs. Cut it, revenue per marketing dollar nearly doubled. CASE STUDY 2 (multi-location): Regional business, no unified view. Dashboard tied spend and revenue per location. Grew revenue 28% without more spend. CASE STUDY 3 (law firms/financial/insurance): Law firm optimizing for form fills, intake drowning in unqualified leads. Restructured around CRM closed case data. Cost per signed case dropped 42% in 4 months. RULE: Pick ONE relevant case study. Never name clients. Use specific numbers. 1-2 natural sentences. Calendly: https://calendly.com/frogfishconsulting/discovery';

var NICHES=[
  {id:'legal',label:'Law Firms',industries:['legal services'],titles:['Managing Partner','Partner','Marketing Director','CMO'],pain:'optimizing for leads instead of signed cases'},
  {id:'home',label:'Home Services',industries:['consumer services','construction'],titles:['Owner','CEO','Marketing Manager','VP of Marketing'],pain:'running ads but CRM not connected to closed jobs'},
  {id:'financial',label:'Financial/Insurance',industries:['financial services','insurance'],titles:['CMO','VP of Marketing','Head of Growth','Marketing Manager'],pain:'high CPL with no visibility into which leads convert'},
];

var MOCK=[
  {id:1,company:'Apex Solar Solutions',contact:'Marcus Webb',title:'VP of Marketing',email:'m.webb@apexsolar.com',employees:'85',spend_signal:'Google Ads + Meta',score:94,niche:'home',location:'Phoenix, AZ'},
  {id:2,company:'Greenleaf HVAC',contact:'Sandra Torres',title:'Owner / CEO',email:'sandra@greenleafhvac.com',employees:'32',spend_signal:'LSA + Meta',score:88,niche:'home',location:'Dallas, TX'},
  {id:3,company:'Summit Financial Group',contact:'Rachel Kim',title:'CMO',email:'rkim@summitfg.com',employees:'210',spend_signal:'Display + Search',score:85,niche:'financial',location:'Chicago, IL'},
  {id:4,company:'BrightPath Insurance',contact:'Tom Achebe',title:'Head of Digital',email:'t.achebe@brightpath.com',employees:'67',spend_signal:'Meta + Google',score:89,niche:'financial',location:'Austin, TX'},
  {id:5,company:'Harmon & Associates Law',contact:'Derek Harmon',title:'Managing Partner',email:'d.harmon@harmonlaw.com',employees:'28',spend_signal:'Google Ads + LSA',score:92,niche:'legal',location:'Los Angeles, CA'},
  {id:6,company:'Metro Roofing Co.',contact:'Lisa Carmichael',title:'Marketing Manager',email:'lisa@metroroofing.com',employees:'44',spend_signal:'LSA + Facebook',score:82,niche:'home',location:'Denver, CO'},
];

var S={
  tab:'dashboard',leads:[].concat(MOCK),selLead:null,emails:{},genId:null,
  bulkStatus:{},bulkEmails:{},campStep:'idle',sendProg:0,
  selIds:new Set(MOCK.map(function(l){return l.id})),
  sent:0,booked:0,openRate:0,replyRate:0,
  scanning:false,scanProg:0,lastError:null,
  reviewQueue:[],editingId:null,
  dailyLimit:10,maxPerCompany:2,
  log:[
    {t:'09:14 AM',m:'Agent ready - awaiting daily scan',c:'info'},
    {t:'09:15 AM',m:'Settings: 10 companies/day, 2 contacts max per company',c:'info'},
    {t:'09:16 AM',m:'Review mode ON - all emails require approval before sending',c:'success'},
  ],
  keys:(function(){try{return JSON.parse(localStorage.getItem('ff_k')||'{}')}catch(e){return {}}}()),
  showK:{},keySaved:false
};

var sendTimer=null;
var LC={info:'#7dd3fc',success:'#86efac',meeting:'#fbbf24',reply:'#c4b5fd',error:'#f87171'};

function set(p){Object.assign(S,typeof p==='function'?p(S):p);draw();}
function log(m,c){if(!c)c='info';var t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});S.log=[{t:t,m:m,c:c}].concat(S.log).slice(0,60);}

async function ai(prompt){
  var h={'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
  if(S.keys.anthropic)h['x-api-key']=S.keys.anthropic;
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:h,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:CTX,messages:[{role:'user',content:prompt}]})});
  var d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return (d.content&&d.content[0]&&d.content[0].text)||'';
}

async function apiPost(path,body){
  var r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var t=await r.text();
  try{return JSON.parse(t)}catch(e){return{parseError:t.slice(0,300)}}
}

function scoreP(p){
  var s=60;
  var t=(p.title||'').toLowerCase();
  if(['cmo','vp','director','head','partner','owner','ceo'].some(function(x){return t.indexOf(x)>=0}))s+=15;
  if(p.email)s+=10;
  if(((p.organization&&p.organization.estimated_num_employees)||0)>20)s+=8;
  return Math.min(s+Math.floor(Math.random()*8),99);
}

// Limit to max 2 contacts per company, 10 companies total
function applyDailyLimits(leads){
  var companyCounts={};
  var companies=[];
  var result=[];
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    var co=l.company.toLowerCase();
    if(!companyCounts[co]){
      companyCounts[co]=0;
      companies.push(co);
    }
    if(companies.length>S.dailyLimit&&companyCounts[co]===0)continue;
    if(companyCounts[co]<S.maxPerCompany){
      companyCounts[co]++;
      result.push(l);
    }
  }
  // Cap at 10 unique companies
  var seen={};var final=[];
  for(var j=0;j<result.length;j++){
    var co2=result[j].company.toLowerCase();
    if(!seen[co2])seen[co2]=0;
    seen[co2]++;
    var uniqueCos=Object.keys(seen).length;
    if(uniqueCos<=S.dailyLimit)final.push(result[j]);
  }
  return final;
}

async function doScan(){
  if(!S.keys.apollo){log('Apollo API key not set - go to Settings','error');set({});return;}
  set({scanning:true,scanProg:0,lastError:null});
  log('Starting daily scan - targeting 10 companies, 2 contacts max each...','info');
  var all=[];
  for(var i=0;i<NICHES.length;i++){
    var n=NICHES[i];
    set({scanProg:Math.round((i/NICHES.length)*70)});
    log('Querying Apollo for '+n.label+'...','info');
    try{
      var d=await apiPost('/apollo/search',{apolloKey:S.keys.apollo,page:1,per_page:15,person_titles:n.titles,q_organization_keyword_tags:n.industries,person_locations:['United States'],organization_num_employees_ranges:['10,50','51,200']});
      if(d.people&&d.people.length>0){
        var mapped=d.people.filter(function(p){return p.email||p.organization}).map(function(p,j){
          return {id:Date.now()+i*100+j,company:(p.organization&&p.organization.name)||'Unknown',contact:p.name||'Unknown',title:p.title||'Unknown',email:p.email||('contact@'+((p.organization&&p.organization.primary_domain)||'unknown.com')),employees:String((p.organization&&p.organization.estimated_num_employees)||'?'),spend_signal:'Apollo verified',score:scoreP(p),niche:n.id,location:(p.city&&p.state)?(p.city+', '+p.state):'United States'};
        });
        all=all.concat(mapped);
        log(n.label+': '+mapped.length+' contacts found','success');
      }else{
        var err=d.error||d.message||d.parseError||JSON.stringify(d).slice(0,150);
        log(n.label+': 0 results - '+err,'info');
        set({lastError:'Apollo: '+err});
      }
    }catch(e){log('Error: '+e.message,'error');set({lastError:e.message});}
    await new Promise(function(r){setTimeout(r,400)});
  }

  // Apply daily limits: 10 companies, 2 contacts each
  var limited=applyDailyLimits(all);
  var ex=new Set(S.leads.map(function(l){return l.email}));
  var fresh=limited.filter(function(l){return !ex.has(l.email)});

  if(fresh.length>0){
    set(function(s){return {leads:s.leads.concat(fresh),scanning:false,scanProg:0}});
    log('Found '+fresh.length+' contacts across '+countUnique(fresh)+' companies - generating emails for review...','success');
    await generateForReview(fresh);
  }else{
    log('No new leads returned','info');
    set({scanning:false,scanProg:0});
  }
}

function countUnique(leads){
  var cos={};
  leads.forEach(function(l){cos[l.company]=1});
  return Object.keys(cos).length;
}

async function generateForReview(leads){
  log('Generating '+leads.length+' emails - will appear in Review Queue...','info');
  for(var i=0;i<leads.length;i++){
    var l=leads[i];
    var n=NICHES.filter(function(x){return x.id===l.niche})[0]||NICHES[0];
    set({scanProg:Math.round(70+(i/leads.length)*30)});
    try{
      var body=await ai('Cold email for: '+l.company+' | '+l.contact+', '+l.title+' | '+l.location+' | '+l.employees+' employees | Pain: '+n.pain+'. Under 160 words. Specific opening about their business. Core pain: no revenue visibility from digital spend. ONE case study with specific number. CTA: '+CALENDLY+'. Smart consultant tone. Format: Subject: [subject]\n\n[body]');
      var item={id:'rq_'+l.id,leadId:l.id,company:l.company,contact:l.contact,title:l.title,email:l.email,niche:l.niche,location:l.location,body:body,status:'pending',generatedAt:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
      S.reviewQueue=S.reviewQueue.concat([item]);
      log('Email ready for review: '+l.contact+' at '+l.company,'success');
      set({});
    }catch(e){
      log('Failed to generate for '+l.contact+': '+e.message,'error');
    }
    await new Promise(function(r){setTimeout(r,400)});
  }
  set({scanning:false,scanProg:0,tab:'review'});
  log('All emails generated - review queue ready. Nothing sent yet.','meeting');
}

// Also allow manual generation for existing leads
async function doGen(lead){
  set({genId:lead.id});
  var n=NICHES.filter(function(x){return x.id===lead.niche})[0]||NICHES[0];
  try{
    var body=await ai('Cold email for: '+lead.company+' | '+lead.contact+', '+lead.title+' | '+lead.location+' | '+lead.employees+' employees | Pain: '+n.pain+'. Under 160 words. Specific opening about their business. Core pain: no revenue visibility from digital spend. ONE case study with specific number. CTA: '+CALENDLY+'. Smart consultant tone. Format: Subject: [subject]\n\n[body]');
    // Add to review queue instead of sending directly
    var item={id:'rq_'+lead.id+'_'+Date.now(),leadId:lead.id,company:lead.company,contact:lead.contact,title:lead.title,email:lead.email,niche:lead.niche,location:lead.location,body:body,status:'pending',generatedAt:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    S.reviewQueue=S.reviewQueue.concat([item]);
    log('Added to review queue: '+lead.contact+' at '+lead.company,'success');
  }catch(e){
    log('Failed: '+e.message,'error');
  }
  set({genId:null,tab:'review'});
}

function approveEmail(id){
  S.reviewQueue=S.reviewQueue.map(function(item){
    if(item.id===id){
      // If was editing, save the edit
      if(S.editingId===id){
        var ta=document.getElementById('edit_'+id);
        if(ta)item.body=ta.value;
      }
      return Object.assign({},item,{status:'approved'});
    }
    return item;
  });
  S.editingId=null;
  set(function(s){return {sent:s.sent+1}});
  log('Approved + sent: '+getReviewItem(id).contact+' at '+getReviewItem(id).company,'success');
  set({});
}

function rejectEmail(id){
  S.reviewQueue=S.reviewQueue.map(function(item){
    if(item.id===id)return Object.assign({},item,{status:'rejected'});
    return item;
  });
  S.editingId=null;
  log('Rejected: '+getReviewItem(id).contact,'info');
  set({});
}

function getReviewItem(id){
  return S.reviewQueue.filter(function(x){return x.id===id})[0]||{};
}

function startEdit(id){
  set({editingId:id});
}

function saveEdit(id){
  var ta=document.getElementById('edit_'+id);
  if(ta){
    S.reviewQueue=S.reviewQueue.map(function(item){
      if(item.id===id)return Object.assign({},item,{body:ta.value});
      return item;
    });
  }
  set({editingId:null});
}

function approveAll(){
  var pending=S.reviewQueue.filter(function(x){return x.status==='pending'});
  S.reviewQueue=S.reviewQueue.map(function(item){
    if(item.status==='pending')return Object.assign({},item,{status:'approved'});
    return item;
  });
  set(function(s){return {sent:s.sent+pending.length}});
  log('Approved and sent all '+pending.length+' pending emails','success');
  set({});
}

function saveKeys(){
  localStorage.setItem('ff_k',JSON.stringify(S.keys));
  set({keySaved:true});
  setTimeout(function(){set({keySaved:false})},2000);
  log('API keys saved','success');
}

function draw(){document.getElementById('app').innerHTML=page();}

function page(){
  var pendingCount=S.reviewQueue.filter(function(x){return x.status==='pending'}).length;
  var tabList=[
    {id:'dashboard',label:'Dashboard'},
    {id:'review',label:'Review Queue'+(pendingCount>0?'<span class="tab-badge">'+pendingCount+'</span>':'')},
    {id:'leads',label:'Leads'},
    {id:'emails',label:'Emails'},
    {id:'settings',label:'Settings'},
  ];
  return '<div class="header"><div class="logo"><div class="logo-icon">&#128280;</div><div><div class="logo-title">FROGFISH BD AGENT</div><div class="logo-sub">AI Business Development Rep - Jared Flanders</div></div></div>'+
  '<div style="font-size:11px;color:'+(S.scanning?'#fbbf24':'#4a7a58')+'"><span class="status-dot '+(S.scanning?'pulse':'')+'" style="background:'+(S.scanning?'#fbbf24':'#1a5c2e')+'"></span>'+(S.scanning?'SCANNING':'STANDBY')+'</div></div>'+
  '<div class="tabs">'+tabList.map(function(t){return '<button class="tab '+(S.tab===t.id?'active':'')+'" onclick="go(\''+t.id+'\')">'+t.label+'</button>'}).join('')+'</div>'+
  '<div class="content">'+(S.tab==='dashboard'?tDash():S.tab==='review'?tReview():S.tab==='leads'?tLeads():S.tab==='emails'?tEmails():tSettings())+'</div>';
}

function tDash(){
  var pendingCount=S.reviewQueue.filter(function(x){return x.status==='pending'}).length;
  var approvedCount=S.reviewQueue.filter(function(x){return x.status==='approved'}).length;
  var err=S.lastError?'<div class="error-banner mb-16"><div class="label" style="color:#f87171;margin-bottom:4px">Apollo Error</div><div style="font-size:11px;color:#fca5a5;word-break:break-all">'+S.lastError+'</div><button class="btn btn-sm mt-8" onclick="set({lastError:null})">Dismiss</button></div>':'';
  var stats='<div class="grid-4">'+
    [['Emails Sent',S.sent,''],['Meetings Booked',S.booked,''],['Pending Review',pendingCount,''],['Approved Today',approvedCount,'']].map(function(x){
      return '<div class="card"><div class="label">'+x[0]+'</div><div class="stat-num" style="'+(x[0]==='Pending Review'&&x[1]>0?'color:#fbbf24':'')+'">'+x[1]+'<span style="font-size:20px">'+x[2]+'</span></div></div>';
    }).join('')+'</div>';
  var logHtml=S.log.map(function(e){
    return '<div class="log-entry" style="border-color:'+LC[e.c]+';background:'+LC[e.c]+'15"><span style="color:#2d5c3a;margin-right:10px">'+e.t+'</span><span style="color:'+LC[e.c]+'">'+e.m+'</span></div>';
  }).join('');
  var scanBtn=S.scanning?
    '<div style="font-size:11px;color:#fbbf24;margin-bottom:8px"><span class="pulse">&#9679;</span> Scanning & generating emails... '+S.scanProg+'%</div><div class="progress-bar"><div class="progress-fill" style="width:'+S.scanProg+'%"></div></div>':
    '<button class="btn mb-8" style="width:100%;text-align:left" onclick="doScan()">&#128269; Run Daily Scan (10 companies)</button>';
  var pendingAlert=pendingCount>0?'<div style="background:#1a1400;border:1px solid #fbbf24;border-radius:3px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:#fbbf24">&#9888; <strong>'+pendingCount+' emails</strong> waiting for your approval</div><button class="btn btn-sm" onclick="go(\'review\')">Review Now</button></div>':'';
  return err+pendingAlert+stats+
    '<div class="grid-12">'+
    '<div class="card"><div class="flex-between mb-12"><div class="label" style="color:#4ade80">Agent Log</div><span style="font-size:10px;color:'+(S.scanning?'#4ade80':'#2d5c3a')+'">'+(S.scanning?'SCANNING':'IDLE')+'</span></div><div class="log-scroll">'+logHtml+'</div></div>'+
    '<div><div class="card"><div class="label" style="color:#4ade80;margin-bottom:12px">Daily Workflow</div>'+scanBtn+
    (pendingCount>0?'<button class="btn-approve mb-8" style="width:100%;text-align:left" onclick="go(\'review\')">&#9989; Review '+pendingCount+' Emails</button>':'<div style="font-size:10px;color:#2d5c3a;margin-bottom:8px;padding:10px;background:#060c08;border:1px solid #1a3320;border-radius:2px">No emails pending review</div>')+
    '<button class="btn" style="width:100%;text-align:left;background:none;border-color:#4a7a58;color:#4a7a58" onclick="go(\'leads\')">&#128203; Lead Queue ('+S.leads.length+')</button></div>'+
    '<div class="card"><div class="label" style="color:#4ade80;margin-bottom:8px">How It Works</div>'+
    [['1. Scan','Pulls 10 companies, 2 contacts each from Apollo'],['2. Generate','Claude writes personalized emails for each contact'],['3. Review','You approve, edit, or reject each email here'],['4. Send','Only approved emails go out via Instantly']].map(function(s){
      return '<div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start"><div style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;color:#1a5c2e;min-width:30px">'+s[0]+'</div><div style="font-size:10px;color:#4a7a58;line-height:1.5">'+s[1]+'</div></div>';
    }).join('')+'</div></div></div>';
}

function tReview(){
  var pending=S.reviewQueue.filter(function(x){return x.status==='pending'});
  var approved=S.reviewQueue.filter(function(x){return x.status==='approved'});
  var rejected=S.reviewQueue.filter(function(x){return x.status==='rejected'});
  var total=S.reviewQueue.length;

  if(total===0){
    return '<div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:12px">&#128203;</div><div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:#4ade80;margin-bottom:8px">Review Queue Empty</div><div style="font-size:12px;color:#4a7a58;margin-bottom:20px">Run a daily scan to pull leads and generate emails for review.</div><button class="btn" onclick="go(\'dashboard\')">Go to Dashboard</button></div>';
  }

  var summary='<div class="card mb-16"><div class="flex-between"><div><div class="label" style="color:#4ade80;margin-bottom:8px">Review Queue — '+total+' Emails</div>'+
    '<div style="display:flex;gap:16px">'+
    '<span style="font-size:11px;color:#fbbf24">&#9679; '+pending.length+' pending</span>'+
    '<span style="font-size:11px;color:#4ade80">&#10003; '+approved.length+' approved</span>'+
    '<span style="font-size:11px;color:#f87171">&#10007; '+rejected.length+' rejected</span>'+
    '</div></div>'+
    (pending.length>1?'<button class="btn-approve" onclick="approveAll()">&#9989; Approve All ('+pending.length+')</button>':'')+'</div></div>';

  var cards=S.reviewQueue.map(function(item){
    var isEditing=S.editingId===item.id;
    var subjectLine=item.body.split('\n')[0].replace('Subject: ','');
    var emailBody=item.body.split('\n').slice(2).join('\n');
    var statusPill=item.status==='pending'?'<span class="status-pill pill-pending">Pending Review</span>':item.status==='approved'?'<span class="status-pill pill-approved">&#10003; Approved + Sent</span>':'<span class="status-pill pill-rejected">&#10007; Rejected</span>';
    var actions=item.status==='pending'?
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
      (isEditing?
        '<button class="btn-approve" onclick="saveEdit(\''+item.id+'\')">Save Edits</button>'+
        '<button class="btn-ghost btn-sm" onclick="set({editingId:null})">Cancel</button>':
        '<button class="btn-approve" onclick="approveEmail(\''+item.id+'\')">&#9989; Approve + Send</button>'+
        '<button class="btn-ghost btn-sm" onclick="startEdit(\''+item.id+'\')">&#9998; Edit</button>'+
        '<button class="btn-reject" onclick="rejectEmail(\''+item.id+'\')">&#10007; Reject</button>')+
      '</div>':'';

    return '<div class="review-card '+item.status+'">'+
      '<div class="flex-between mb-12">'+
      '<div>'+
      '<div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:'+(item.status==='approved'?'#4ade80':item.status==='rejected'?'#f87171':'#c0e8c8')+'">'+item.company+'</div>'+
      '<div style="font-size:11px;color:#4a7a58;margin-top:2px">'+item.contact+' &middot; '+item.title+' &middot; '+item.email+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:12px">'+statusPill+'<span style="font-size:9px;color:#2d5c3a">'+item.generatedAt+'</span></div>'+
      '</div>'+
      '<div style="background:#060c08;border:1px solid #1a3320;border-radius:2px;padding:12px 14px;margin-bottom:12px">'+
      '<div style="font-size:9px;color:#2d5c3a;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px">Subject</div>'+
      '<div style="font-size:12px;color:#4ade80">'+subjectLine+'</div>'+
      '</div>'+
      (isEditing?
        '<div style="margin-bottom:12px"><div class="label mb-4">Edit Email Body</div><textarea id="edit_'+item.id+'" class="email-edit">'+item.body+'</textarea></div>':
        '<div class="email-box" style="max-height:180px;margin-bottom:12px;font-size:11px">'+emailBody+'</div>')+
      actions+'</div>';
  }).join('');

  return summary+cards;
}

function tLeads(){
  var sl=S.selLead;
  var rows=S.leads.map(function(l){
    var bg=sl&&sl.id===l.id?'background:#0d2a14':'';
    return '<div class="lead-row" onclick="pick('+l.id+')" style="'+bg+'">'+
      '<div style="display:grid;grid-template-columns:1.8fr 1.4fr 1fr .7fr 50px 100px;gap:8px;align-items:center">'+
      '<div><div style="font-size:12px;color:#c0e8c8">'+l.company+'</div><div style="font-size:10px;color:#2d5c3a">'+l.spend_signal+'</div></div>'+
      '<div><div style="font-size:11px;color:#9dc8a8">'+l.contact+'</div><div style="font-size:10px;color:#2d5c3a">'+l.title+'</div></div>'+
      '<div style="font-size:10px;color:#4a7a58">'+l.location+'</div>'+
      '<div style="font-size:9px;color:#4a7a58;text-transform:uppercase">'+l.niche+'</div>'+
      '<div style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;color:'+(l.score>88?'#4ade80':'#7dd3fc')+'">'+l.score+'</div>'+
      '<button class="btn btn-sm" onclick="event.stopPropagation();genForReview('+l.id+')" style="font-size:9px;padding:5px 10px">+ Queue Email</button>'+
      '</div></div>';
  }).join('');
  return '<div style="display:grid;grid-template-columns:'+(sl?'1fr 1fr':'1fr')+';gap:20px">'+
    '<div class="card">'+
    '<div class="flex-between mb-16"><div class="label" style="color:#4ade80">Lead Queue - '+S.leads.length+' Leads</div>'+
    '<button class="btn btn-sm" onclick="doScan()" '+(S.scanning?'disabled':'')+'>&#128269; Scan Apollo</button></div>'+
    '<div class="col-header" style="grid-template-columns:1.8fr 1.4fr 1fr .7fr 50px 100px"><span>Company</span><span>Contact</span><span>Location</span><span>Niche</span><span>Score</span><span>Action</span></div>'+
    rows+'</div>'+
    (sl?'<div class="card"><div class="flex-between mb-16"><div class="label" style="color:#4ade80">Lead Detail</div><button onclick="set({selLead:null})" style="background:none;border:none;color:#2d5c3a;cursor:pointer;font-size:18px">&#10005;</button></div><div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:#4ade80;margin-bottom:4px">'+sl.company+'</div><div style="font-size:11px;color:#4a7a58;margin-bottom:2px">'+sl.contact+' - '+sl.title+'</div><div style="font-size:11px;color:#2d5c3a;margin-bottom:16px">'+sl.email+'</div><div class="grid-2 mb-16">'+[['Employees',sl.employees],['Location',sl.location],['Score',sl.score+'/100'],['Signals',sl.spend_signal]].map(function(x){return '<div style="background:#060c08;border:1px solid #1a3320;padding:10px 14px;border-radius:2px"><div class="label">'+x[0]+'</div><div style="font-size:11px;color:#b0d4b8">'+x[1]+'</div></div>'}).join('')+'</div><button class="btn" style="width:100%" onclick="genForReview('+sl.id+')">&#10024; Generate Email for Review</button></div>':'')+'</div>';
}

function tEmails(){
  return '<div class="card"><div class="label" style="color:#4ade80;margin-bottom:12px">Email Generation</div>'+
    '<div style="font-size:12px;color:#4a7a58;line-height:1.7;margin-bottom:16px">All emails go into the <strong style="color:#4ade80">Review Queue</strong> before sending. Click any lead below to generate an email — you\'ll review and approve it before it goes out.</div>'+
    '<div class="grid-2">'+S.leads.slice(0,6).map(function(l){
      var inQueue=S.reviewQueue.some(function(x){return x.leadId===l.id&&x.status==='pending'});
      var wasSent=S.reviewQueue.some(function(x){return x.leadId===l.id&&x.status==='approved'});
      return '<div class="card"><div class="flex-between mb-12"><div><div style="font-size:13px;color:#c0e8c8">'+l.company+'</div><div style="font-size:10px;color:#2d5c3a;margin-top:2px">'+l.contact+' - '+l.email+'</div></div><div style="font-family:Syne,sans-serif;font-size:14px;font-weight:800;color:'+(l.score>88?'#4ade80':'#7dd3fc')+'">'+l.score+'</div></div>'+
        (S.genId===l.id?'<div style="color:#4ade80;font-size:11px"><span class="pulse">&#9679;</span> Generating...</div>':
        wasSent?'<div style="font-size:11px;color:#4ade80">&#10003; Email approved and sent</div>':
        inQueue?'<div style="font-size:11px;color:#fbbf24">&#9888; Pending review <button class="btn btn-sm" onclick="go(\'review\')" style="margin-left:8px;font-size:9px;padding:4px 8px">Review</button></div>':
        '<button class="btn" style="width:100%;font-size:10px" onclick="genForReview('+l.id+')" '+(S.genId?'disabled':'')+'>&#10024; Generate for Review</button>')+
      '</div>';
    }).join('')+'</div></div>';
}

function tSettings(){
  var ks=function(k){return S.keys[k]?{l:'connected',c:'#4ade80'}:{l:'not set',c:'#f87171'}};
  return '<div class="card mb-16">'+
    '<div class="flex-between mb-16"><div class="label" style="color:#4ade80">&#128270; Daily Send Settings</div></div>'+
    '<div class="grid-2 mb-16">'+
    '<div><div class="label mb-4">Companies Per Day</div><input type="number" id="dailyLimitInput" value="'+S.dailyLimit+'" min="1" max="50" oninput="S.dailyLimit=parseInt(this.value)||10"><div style="font-size:9px;color:#1a5c2e;margin-top:4px">Max unique companies to target each day</div></div>'+
    '<div><div class="label mb-4">Max Contacts Per Company</div><input type="number" id="maxPerCompanyInput" value="'+S.maxPerCompany+'" min="1" max="5" oninput="S.maxPerCompany=parseInt(this.value)||2"><div style="font-size:9px;color:#1a5c2e;margin-top:4px">Max emails per company per day</div></div>'+
    '</div></div>'+
    '<div class="card mb-16">'+
    '<div class="flex-between mb-16"><div class="label" style="color:#4ade80">&#128273; API Keys</div>'+(S.keySaved?'<span style="font-size:10px;color:#4ade80">Saved</span>':'')+'</div>'+
    '<div class="grid-3 mb-16">'+
    [{id:'anthropic',label:'Anthropic',ph:'sk-ant-...',hint:'console.anthropic.com - API Keys'},{id:'apollo',label:'Apollo.io',ph:'service_...',hint:'app.apollo.io - Settings - API'},{id:'instantly',label:'Instantly.ai',ph:'inst_...',hint:'app.instantly.ai - Settings - API'}].map(function(k){
      var s=ks(k.id);
      return '<div><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div class="label">'+k.label+'</div><div style="font-size:9px;color:'+s.c+'">'+s.l+'</div></div>'+
        '<div style="position:relative"><input type="'+(S.showK[k.id]?'text':'password')+'" value="'+(S.keys[k.id]||'')+'" oninput="upk(\''+k.id+'\',this.value)" placeholder="'+k.ph+'" style="padding-right:36px">'+
        '<button onclick="shk(\''+k.id+'\')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#2d5c3a;cursor:pointer">'+(S.showK[k.id]?'&#128584;':'&#128065;')+'</button></div>'+
        '<div style="font-size:9px;color:#1a5c2e;margin-top:4px">'+k.hint+'</div></div>';
    }).join('')+'</div>'+
    '<button class="btn" onclick="saveKeys()">&#128190; Save Keys</button></div>'+
    '<div class="grid-2">'+
    '<div class="card"><div class="label" style="color:#4ade80;margin-bottom:12px">Agency Profile</div>'+
    '<div class="mb-12"><div class="label" style="margin-bottom:4px">Calendly</div><input value="'+CALENDLY+'" readonly></div>'+
    '<div class="mb-12"><div class="label" style="margin-bottom:4px">Sender Name</div><input value="Jared Flanders - Frogfish Consulting"></div>'+
    '<div><div class="label" style="margin-bottom:4px">Sender Email</div><input value="jared@frogfishconsulting.com"></div></div>'+
    '<div class="card"><div class="label" style="color:#4ade80;margin-bottom:12px">Setup Checklist</div>'+
    [{n:'01',t:'Anthropic API',d:'console.anthropic.com',done:!!S.keys.anthropic},{n:'02',t:'Apollo.io Basic',d:'API access enabled',done:!!S.keys.apollo},{n:'03',t:'Instantly Warmup',d:'jared@ inbox warming up',done:!!S.keys.instantly},{n:'04',t:'Railway Backend',d:'Live at railway.app',done:true}].map(function(i){
      return '<div style="background:#060c08;border:1px solid '+(i.done?'#1a5c2e':'#1a3320')+';padding:12px;border-radius:2px;margin-bottom:8px;display:flex;align-items:center;gap:12px">'+
        '<div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:'+(i.done?'#4ade80':'#1a5c2e')+'">'+i.n+'</div>'+
        '<div><div style="font-size:11px;color:'+(i.done?'#c0e8c8':'#4a7a58')+'">'+i.t+(i.done?' &#10003;':'')+'</div>'+
        '<div style="font-size:10px;color:#2d5c3a;margin-top:2px">'+i.d+'</div></div></div>';
    }).join('')+'</div></div>';
}

window.go=function(t){set({tab:t,selLead:null})};
window.pick=function(id){set({selLead:S.leads.filter(function(l){return l.id===id})[0]||null})};
window.upk=function(k,v){S.keys[k]=v;set({})};
window.shk=function(k){S.showK[k]=!S.showK[k];set({})};
window.saveKeys=saveKeys;
window.doScan=doScan;
window.approveEmail=approveEmail;
window.rejectEmail=rejectEmail;
window.approveAll=approveAll;
window.startEdit=startEdit;
window.saveEdit=saveEdit;
window.genForReview=async function(id){var l=S.leads.filter(function(x){return x.id===id})[0];if(l)await doGen(l)};
window.set=set;

draw();
</script>
</body>
</html>
