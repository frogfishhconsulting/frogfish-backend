<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frogfish BD Agent</title>

<style>

body{
font-family:Arial;
background:#07130e;
color:#e2ffe8;
padding:30px;
}

h1{
margin-bottom:25px;
}

.card{
background:#0e1a12;
border:1px solid #1a3320;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:14px;
background:#08100c;
color:#e2ffe8;
border:1px solid #24402d;
border-radius:6px;
}

button{
background:#1a5c2e;
color:#4ade80;
border:1px solid #4ade80;
padding:10px 16px;
cursor:pointer;
border-radius:6px;
margin-right:8px;
}

button:hover{
background:#4ade80;
color:#07130e;
}

.lead{
padding:10px;
border-bottom:1px solid #1a3320;
cursor:pointer;
}

.lead:hover{
background:#102016;
}

pre{
background:#08100c;
padding:12px;
border-radius:6px;
}

</style>

</head>

<body>

<h1>🐸 Frogfish BD Agent</h1>

<div class="card">

<h3>API Keys</h3>

<input id="anthropicKey" placeholder="Anthropic API key">
<input id="apolloKey" placeholder="Apollo API key">
<input id="instantlyKey" placeholder="Instantly API key">

<button onclick="saveKeys()">Save Keys</button>

</div>

<div class="card">

<h3>Find Leads</h3>

<select id="industry">
<option value="law firms">Law Firms</option>
<option value="home services">Home Services</option>
<option value="financial services">Financial</option>
</select>

<select id="title">
<option value="CMO">CMO</option>
<option value="VP Marketing">VP Marketing</option>
<option value="Marketing Director">Marketing Director</option>
<option value="Owner">Owner</option>
</select>

<button onclick="scanApollo()">Scan Apollo</button>

<div id="scanStatus"></div>

</div>

<div class="card">

<h3>Leads</h3>

<div id="leadList"></div>

</div>

<div class="card">

<h3>Lead Detail</h3>

<div id="leadDetail">Select a lead</div>

</div>

<script>

let state={
leads:[],
selected:null,
email:""
}

function saveKeys(){

localStorage.setItem("anthropicKey",document.getElementById("anthropicKey").value)
localStorage.setItem("apolloKey",document.getElementById("apolloKey").value)
localStorage.setItem("instantlyKey",document.getElementById("instantlyKey").value)

alert("Saved")

}

async function scanApollo(){

document.getElementById("scanStatus").innerText="Scanning..."

const res=await fetch("/apollo/search",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
apolloKey:localStorage.getItem("apolloKey"),
page:1,
per_page:10
})
})

const data=await res.json()

state.leads=data.people||[]

renderLeads()

document.getElementById("scanStatus").innerText=state.leads.length+" leads found"

}

function renderLeads(){

const list=document.getElementById("leadList")

list.innerHTML=state.leads.map((l,i)=>`
<div class="lead" onclick="selectLead(${i})">
<b>${l.name||""}</b><br>
${l.title||""}<br>
${l.email||""}
</div>
`).join("")

}

function selectLead(i){

state.selected=state.leads[i]

document.getElementById("leadDetail").innerHTML=`
<b>${state.selected.name}</b><br>
${state.selected.title}<br>
${state.selected.email}<br><br>

<button onclick="generateEmail()">Generate Email</button>
<button onclick="sendEmail()">Send Email</button>

<pre id="emailBox"></pre>
`

}

async function generateEmail(){

const res=await fetch("/anthropic/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
anthropicKey:localStorage.getItem("anthropicKey"),
prompt:"Write a short cold email to "+state.selected.name+" at "+state.selected.organization?.name+" about improving marketing ROI."
})
})

const data=await res.json()

state.email=data.content?.[0]?.text||""

document.getElementById("emailBox").innerText=state.email

}

async function sendEmail(){

await fetch("/instantly/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
instantlyKey:localStorage.getItem("instantlyKey"),
to:state.selected.email,
subject:"Quick question",
body:state.email
})
})

alert("Email sent")

}

</script>

</body>
</html>
