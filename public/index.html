<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frogfish BD Agent</title>
<style>
body {
  font-family: Arial;
  background: #0a0f0d;
  color: #e2ffe8;
  padding: 40px;
}
.card {
  background: #0e1a12;
  border: 1px solid #1a3320;
  padding: 20px;
  border-radius: 6px;
}
button {
  background:#1a5c2e;
  color:#4ade80;
  border:1px solid #4ade80;
  padding:10px 16px;
  cursor:pointer;
}
textarea {
  width:100%;
  height:200px;
}
</style>
</head>

<body>

<h1>🐸 Frogfish BD Agent</h1>

<div class="card">
<p>Generate a cold email using Claude.</p>

<input id="key" placeholder="Anthropic API key (sk-ant...)" style="width:100%;margin-bottom:10px;" />

<textarea id="prompt">Write a cold outbound email for a marketing agency helping companies connect CRM revenue data to Google Ads.</textarea>

<br><br>

<button onclick="generate()">Generate Email</button>

<pre id="result"></pre>

</div>

<script>

async function generate() {

  const key = document.getElementById("key").value
  const prompt = document.getElementById("prompt").value

  const res = await fetch("/anthropic/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({
      anthropicKey:key,
      prompt
    })
  })

  const data = await res.json()

  document.getElementById("result").textContent =
    data.content?.[0]?.text || JSON.stringify(data,null,2)
}

</script>

</body>
</html>
